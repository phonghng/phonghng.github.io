    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-base: #000000;
            --bg-surface: #121212;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ef4444;
            /* Đỏ cho yêu thích */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-y: scroll;
            /* Chống giật trang khi xuất hiện scrollbar */
        }

        /* Tùy chỉnh thanh cuộn tinh tế */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Tiêu chuẩn Web - Focus State cho Accessibility */
        *:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 4px;
            border-radius: 4px;
        }

        /* Utilities cho Poster */
        .poster-aspect {
            aspect-ratio: 2 / 3;
            background-color: var(--bg-surface);
        }
    </style>
</head>

        // Tạo SVG Trái tim cho mục Yêu (Yêu thích)
        const IconHeartSmall = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        `;

        // Tạo SVG Thumbs Up cho mục Thích
        const IconLikeSmall = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5">
                <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
            </svg>
        `;

        // Render từng thẻ phim (Card)
        function createCard(item) {
            const isMovie = (item.type === 'movie');
            const isFav = (item.status === 'favorite');
            const isLiked = (item.status === 'liked');
            const isWaitlist = (item.status === 'waitlist');
            const displayTitle = item.title_vi || item.title_original;

            // Lọc và chuyển đổi thành dạng mảng tag (đánh dấu in nghiêng cho tên gốc)
            let infoArray = [];
            if (isMovie) {
                if (item.title_vi && item.title_vi !== item.title_original) infoArray.push({ text: item.title_original, italic: true });
                if (item.release_year) infoArray.push({ text: item.release_year });
                if (item.director) infoArray.push({ text: item.director });
                if (item.producer) infoArray.push({ text: item.producer });
            } else {
                if (item.title_vi && item.title_vi !== item.title_original) infoArray.push({ text: item.title_original, italic: true });
                if (item.start_year) infoArray.push({ text: item.start_year });
                if (item.platform) infoArray.push({ text: item.platform });
            }

            // Tạo HTML cho các tag (thêm class italic nếu được đánh dấu)
            const tagsHtml = infoArray.map(info =>
                `<span class="inline-block px-2 py-1 bg-white/10 text-neutral-300 text-[0.7rem] md:text-xs rounded-md break-words ${info.italic ? 'italic' : ''}">${info.text}</span>`
            ).join('');

            // Tag icon trái tim nếu là yêu thích (favorite)
            const favTag = isFav
                ? `<span class="inline-flex items-center justify-center px-2 py-1 bg-red-500/20 border border-red-500/30 text-red-500 rounded-md shadow-sm" aria-label="Đã yêu thích">${IconHeartSmall}</span>`
                : '';

            // Tag icon thumbs up nếu là thích (liked)
            const likedTag = isLiked
                ? `<span class="inline-flex items-center justify-center px-2 py-1 bg-blue-500/20 border border-blue-500/30 text-blue-400 rounded-md shadow-sm" aria-label="Đã thích">${IconLikeSmall}</span>`
                : '';

            // Class làm mờ và đen trắng cho phim chưa xem (waitlist)
            const posterDimClass = isWaitlist ? 'grayscale blur-[5px]' : '';

            // Layout Card: Hover chỉ zoom poster, ảnh co dãn khớp 100% tỉ lệ (object-fill)
            return `
                <article class="flex flex-col gap-3 h-full outline-none focus-visible:ring-2 focus-visible:ring-white rounded-lg" tabindex="0" aria-label="${displayTitle}">
                    <div class="group relative w-full poster-aspect rounded-lg overflow-hidden bg-neutral-900 ring-1 ring-white/5 shrink-0">
                        <img 
                            src="${item.poster_url}" 
                            alt="Poster của ${displayTitle}" 
                            class="absolute inset-0 w-full h-full object-fill transition-transform duration-500 ease-out group-hover:scale-105 ${posterDimClass}"
                            loading="lazy"
                            onerror="this.src='https://placehold.co/400x600/121212/333333?text=No+Poster'"
                        >
                    </div>
                    <div class="flex flex-col px-0.5 flex-1">
                        <h3 class="text-sm md:text-base font-semibold text-white/95 break-words">
                            ${displayTitle}
                        </h3>
                        <div class="flex flex-wrap gap-1.5 mt-2 content-start">
                            ${favTag}
                            ${likedTag}
                            ${tagsHtml}
                        </div>
                    </div>
                </article>
            `;
        }

        // Main Render Logic
        function render() {
            const container = document.getElementById('app-container');

            // Lọc dữ liệu hợp lệ (loại bỏ template)
            const activeData = DATA.filter(item => !item.hidden);

            // Render toàn bộ vào một lưới (grid) duy nhất, stretch để chiều cao bằng nhau
            container.innerHTML = `
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 md:gap-x-6 gap-y-10 items-stretch">
                    ${activeData.map(item => createCard(item)).join('')}
                </div>
            `;
        }

        // Tối ưu hóa sự kiện resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(render, 150);
        });

        // Khởi chạy
        document.addEventListener('DOMContentLoaded', render);
    </script>
