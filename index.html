<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhongHNg</title>
    <link rel="shortcut icon" href="./PhongHNg.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

    <style>
        :root {
            --BLUE: #1877F2;
            --CHERRY: #F3425F;
            --GRAPE: #9360F7;
            --LEMON: #F7B928;
            --LIME: #45BD62;
            --PINK: #FF66BF;
            --SEAFOAM: #54C7EC;
            --TEAL: #2ABBA7;
            --TOMATO: #FB724B;

            --BODY_BGCOLOR: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr min-content 1fr;
            grid-auto-columns: 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "."
                "body"
                ".";
            width: 100%;
            height: 100%;
        }

        body {
            grid-area: body;
            margin: 0 auto;
            padding: 15px;
            font-size: 18px;
            background-color: var(--BODY_BGCOLOR);
            max-width: 500px;
        }

        a {
            cursor: pointer;
            color: var(--BLUE);
            text-decoration: none;
        }

        a:active {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div style="text-align: center">
        <img src="./PhongHNg.png" alt="PhongHNg logo" title="PhongHNg logo"
            style="height: 150px; width: 150px; border-radius: 10px;" />
    </div>

    <div id="basic">
        <h1>Thông tin cơ bản</h1>

        <p data-item_title="Họ tên">
            Nguyễn Hải Phong
        </p>

        <p data-item_title="Biệt danh">
            PhongHNg
        </p>

        <p data-item_title="Số CCCD">
            019.208.XXXXXX
        </p>
    </div>

    <div id="contact">
        <h1>Thông tin liên hệ</h1>

        <p data-item_title="Email">
            <a data-autolink="email">phonghng8420@gmail.com</a>
        </p>

        <p data-item_title="Zalo">
            <a data-autolink="zalo">0562165940</a>
        </p>
        
        <p data-item_title="Github">
            <a data-autolink="link">https://github.com/phonghng/</a>
        </p>
        
        <p data-item_title="Facebook">
            <a data-autolink="link">https://facebook.com/phonghng102/</a>
        </p>
    </div>

    <script>
        /* Auto link a tags */
        const LINK_PREFIXES = {
            "email": "mailto:",
            "link": "",
            "zalo": "https://zalo.me/"
        };
        let autolink_a_tags = document.querySelectorAll("a[data-autolink]");
        autolink_a_tags.forEach(a_tag => {
        let prefix = LINK_PREFIXES[a_tag.dataset.autolink];
            a_tag.href = `${prefix}${a_tag.innerHTML}`;
            a_tag.target = "_blank";
        });

        /* Append title to items */
        let items = document.querySelectorAll("p[data-item_title]");
        items.forEach(item => {
            let title = document.createElement("strong");
            title.innerHTML = `${item.dataset.item_title}:`;
            item.insertBefore(title, item.firstChild);
        });
    </script>
</body>

</html>
