<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhongHNg</title>
    <link rel="shortcut icon" href="./images/PhongHNg.png" type="image/x-icon">

    <script src="./javascript/crypto-js.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

    <style>
        :root {
            --BLUE: #1877F2;
            --CHERRY: #F3425F;
            --GRAPE: #9360F7;
            --LEMON: #F7B928;
            --LIME: #45BD62;
            --PINK: #FF66BF;
            --SEAFOAM: #54C7EC;
            --TEAL: #2ABBA7;
            --TOMATO: #FB724B;

            --BODY_BGCOLOR: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr min-content 1fr;
            grid-auto-columns: 1fr;
            gap: 0px 0px;
            grid-auto-flow: row;
            grid-template-areas:
                "."
                "body"
                ".";
            width: 100%;
            height: 100%;
        }

        body {
            grid-area: body;
            margin: 0 auto;
            padding: 15px;
            font-size: 18px;
            background-color: var(--BODY_BGCOLOR);
            max-width: 500px;
            text-align: justify;
        }

        a {
            cursor: pointer;
            color: var(--BLUE);
            text-decoration: none;
        }

        a:active {
            text-decoration: underline;
        }

        a.reveal_info {
            color: var(--CHERRY);
        }
    </style>
</head>

<body>
    <div style="text-align: center">
        <img src="./images/PhongHNg.png" alt="PhongHNg logo" title="PhongHNg logo"
            style="height: 150px; width: 150px; border-radius: 10px;" />
    </div>

    <div id="basic_personal_information">
        <h1>Thông tin cá nhân cơ bản</h1>

        <p _item_title="Họ tên">
            Nguyễn Hải Phong
        </p>

        <p _item_title="Biệt danh">
            PhongHNg
        </p>

        <p _item_title="Số CCCD cơ bản">
            019.208.XXXXXX

    </div>

    <div id="basic_contact_information">
        <h1>Thông tin liên lạc cơ bản</h1>

        <p _item_title="Email">
            <a _link_type="email">phonghng8420@gmail.com</a>
        </p>

        <p _item_title="Zalo">

        <p _item_title="Facebook">

    <div id="emergency_contact_information">
        <h1>Thông tin liên lạc khẩn cấp</h1>

        <p _item_title="Số CCCD đầy đủ">

        <p _item_title="SĐT bố">

        <p _item_title="SĐT mẹ">

        <p _item_title="Chỗ ở hiện tại">
            <a class="reveal_info"></a>
            <a _link_type="geohack" _geohack_latitude _geohack_longitude></a>

        <p _item_title="Trường học hiện tại">
            <a class="reveal_info"></a>
            <a _link_type="geohack" _geohack_latitude _geohack_longitude></a>
        </p>
    </div>

    <script>
        /**
         * - - - ABBRAVIATION - - -
         * ECI = emergency contact information
         */

        const ECI_ENCRYPTED = `U2FsdGVkX1+nZti/jSatSVrlLHckJh4w/xif0gohaEdQzUfe27pjgIPNy6hsNlAadWAr6bROHZeAlQF2gefsSq68WNohFxmHDNE479/Ip+/a99lQ78mwb4h4nvoKmei5BhQlNDA46qTBfTex8spGRHjBbMbEU1vOkgJmvPq43ITmcwPebbylYTpjc0HJKbw9ZET4IeyNEjIGFwyFiXCwZbPa8oAcZfJY6HtwqG6vyhRW2z/VOPUwfUdGCTS7GXhxUj1WplJz8Y9AUlQKvP823rDv+ob1L0xwtlDqycjfIkHG5PACYRKe1DIM9/OJVVj46VL7Bejb4CWQVEQ4BmUKB+yAZypKo4KjB2Fw0Xv0BBWndjzFyzuPBMpHGw/3RziX4DMUYHRnSVwftH0tfXgw6Deroe9H7yZ99cpOrGq67sXl4NhIpDU8ZhNWqTLqk+oMHkYUfohz2zJz9LvWipgPeJemifuu9zlEjMeDzQmcVeDpgux3Ains0NGrU7DDeqq8sGEMdOwdBAA2MdUrTe6DfXmbznBKBU5bWHDd0k88sO23XbWPVgz5oJD7VdumFOa2Abcj/jFsl+g4gR/ffspwxKHorczVkgtlOztNH/H+l/cTLO8V+Sdf91eEY00brVUuU61Uj60C3QDswonG3Yy0m9/Hhwuokj9TMjGfD59aHfH81DqgNShwnPCpGL+c5ea3ZuSLRwOZqKF16eSaiKz81Vd83tnFKx2QR7ryruy3u+A=`;

        function link_anchor_tags() {
            let elements = document.querySelectorAll("a[_link_type]");
            for (const element of elements) {
                let link_type = element.getAttribute("_link_type");
                switch (link_type) {
                    case "email":
                        element.href = `mailto:${element.innerHTML}`;
                        break;
                    case "link":
                        element.href = `${element.innerHTML}`;
                        break;
                    case "zalo":
                        element.href = `https://zalo.me/${element.innerHTML.replace(/\./g, "")}`;
                        break;
                    case "phone":
                        element.href = `tel:${element.innerHTML.replace(/\./g, "")}`;
                        break;
                    case "geohack":
                        let latitude = element.getAttribute("_geohack_latitude");
                        let longitude = element.getAttribute("_geohack_longitude");
                        element.href = `https://geohack.toolforge.org/geohack.php?language=vi&pagename=${element.innerHTML}&params=${latitude};${longitude}`;
                        break;
                }

                element.target = "_blank";
            }
        }

        function append_items_title() {
            let items = document.querySelectorAll("p[_item_title]");
            for (const item of items) {
                let title = document.createElement("strong");
                title.innerHTML = `${item.getAttribute("_item_title")}:`;
                item.insertBefore(title, item.firstChild);
            }
        }

        function eci_encrypt(json, password) {
            let json_stringified = JSON.stringify(json);
            return CryptoJS.AES.encrypt(json_stringified, password).toString();
        }

        function eci_decrypt(encrypted_json, password, reveal_info_anchor) {
            let decrypted;

            try {
                decrypted =
                    CryptoJS.AES.decrypt(
                        encrypted_json || ECI_ENCRYPTED,
                        password
                    ).toString(CryptoJS.enc.Utf8);
            } catch (error) {
                alert(`Đã xảy ra lỗi: "${error.message}". Có thể là do mật khẩu bị sai. Vui lòng kiểm tra lại!`);
                return;
            }

            reveal_info_anchor.style.display = "none";

            let json = JSON.parse(decrypted);

            let item_title = reveal_info_anchor.parentElement.getAttribute("_item_title")

            let element =
                document.querySelector(`p[_item_title="${item_title}"] a[_link_type]`)
                || document.querySelector(`p[_item_title="${item_title}"] span`);

            let element_attributes = json[item_title];
            for (const name in element_attributes) {
                const value = element_attributes[name];
                if (name.startsWith("_")) {
                    element.setAttribute(name, value);
                } else {
                    element[name] = value;
                }
            }

            link_anchor_tags();
        }

        function assign_eci_reveal_info_anchor() {
            let anchors = document.querySelectorAll("p[_item_title] a.reveal_info");
            for (const anchor of anchors) {
                anchor.innerHTML = "Bấm vào đây để hiện thông tin...";
                anchor.onclick = (event) => {
                    eci_decrypt(
                        ECI_ENCRYPTED,
                        prompt('Nhập mật khẩu:'),
                        event.target
                    );
                };
            }
        }

        link_anchor_tags();
        append_items_title();
        assign_eci_reveal_info_anchor();
    </script>
</body>

</html>
