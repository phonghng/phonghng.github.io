        let private_note_type = get_url_param("private_note_type");
        let private_note_content = ``;
        switch (private_note_type) {
            case "code__closed_source__ctn__exercise": {
                let teacher = [
                    "Đỗ Thị Linh",
                    "Nguyễn Thị Kim Tuyến"
                ][parseInt(get_url_param("teacher_code"))];
                private_note_content =
                    `Đoạn mã được viết bởi tôi (thông tin liên lạc được đăng tải ở dưới).<br/>
                    <br/>
                    Bất kì trường hợp sử dụng đoạn mã nào, phải chấp hành theo pháp luật sở hữu trí tuệ của nước Cộng hoà xã hội chủ nghĩa Việt Nam. Trong đó, sử dụng toàn bộ hoặc một phần đoạn mã là sản phẩm trí tuệ của tôi phải giữ nguyên hoặc thêm dòng ghi chú có đường liên kết trỏ tới trang web này.<br/>

                    Quy tắc đặt tên trong đoạn mã:<br/>
                    – Tên hằng: Hai chữ cái hoa (ví dụ: "AB").<br/>
                    – Tên biến nhập từ đầu bài: Một chữ cái hoa (ví dụ: "A").<br/>
                    – Tên biến do người lập trình đặt: Một hoặc nhiều chữ cái thường (ví dụ: "a", "abc"). Một số tên thường được sử dụng với mục đích đặc biệt:<br/>
                    + "r": result, kết quả.<br/>
                    + "c": counter, bộ đếm.<br/>
                    + "i", "j": index, chỉ số.<br/>
                    + "f": flag, đánh dấu.<br/>
                    + "ln": (giá trị) lớn nhất.<br/>
                    + "nn": (giá trị) nhỏ nhất.<br/>
                    – Tên biến tạm thời: Một dấu gạch dưới (ví dụ: "_").<br/>
                    – Tên biến dẫn xuất từ biến do người lập trình đặt: Một dấu gạch dưới theo sau bởi tên biến do người lập trình đặt (ví dụ: "_a").<br/>
                    – Tên hàm (trừ hàm "main"): Một chữ cái hoa theo sau bởi một chữ cái thường (ví dụ: "Ab").<br/>`;

            }

                    <br/>

                    <br/>

                    <br/>

                    – Trường hợp tờ đơn: Trang thứ nhất có các trường thông tin, trang thứ hai ở vị trí mặt sau của trang thứ nhất.<br/>
                    – Trường hợp tờ đôi: Trang thứ nhất có các trường thông tin, trang thứ hai ở vị trí mặt sau của trang thứ nhất, trang thứ ba ở vị trí bên trái của trang thứ hai, trang thứ tư ở vị trí mặt sau của trang thứ ba.<br/>
                    <br/>
                    Yêu cầu ghi thông tin ở các trường thông tin:<br/>
                    – Ghi đầy đủ thông tin cần thiết ở tờ thứ nhất; từ tờ thứ hai trở đi, chỉ cần kí. Giấy kiểm tra/giấy thi hợp lệ khi có chữ kí của người làm bài.<br/>
                    – Với trường "Trường", có thể ghi thêm tên tỉnh thành, tên quốc gia, v.v..<br/>
                    – Với trường "Lớp", nếu không có trường "Trường", có thể ghi thêm thông tin như trường "Trường".<br/>
                    – Với trường "Họ tên", có thể ghi thêm số báo danh, v.v..<br/>
                    – Với trường "Môn", có thể ghi thêm mã đề, v.v..<br/>
                    – Với chỗ trống ngay trên trường "Môn", cần ghi tên kì kiểm tra/thi hoặc/và bài kiểm tra/thi (có thể viết tắt). Ví dụ: "Kì kiểm tra cuối kì I", "Bài kiểm tra thường xuyên", "Kì thi TN THPT – Bài thi: KHTN"`;
                break;
            }

            case "product__education_use__ctn": {
                private_note_content =
                    `"${get_url_param("product_name")}" là sản phẩm thuộc sở hữu của tôi (thông tin liên lạc được đăng tải ở dưới). Sản phẩm được tôi sử dụng với mục đích giáo dục trong quá trình học tập tại Trung học phổ thông chuyên Thái Nguyên.<br/>
                    <br/>
                    Bất kì trường hợp sử dụng nào, phải chấp hành theo pháp luật sở hữu trí tuệ của nước Cộng hoà xã hội chủ nghĩa Việt Nam. Trong đó, sử dụng toàn bộ hoặc một phần đoạn mã là sản phẩm trí tuệ của tôi phải giữ nguyên hoặc thêm dòng ghi chú có đường liên kết trỏ tới trang web này.`;
                break;
            }
        }
