<!DOCTYPE html>
<html>

<head>
    <title>Truy cập nhanh</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn-uicons.flaticon.com/2.6.0/uicons-bold-rounded/css/uicons-bold-rounded.css" rel="stylesheet">
    <script src="https://phonghng.github.io/scripts/PPPL-JS.js"></script>
    <style>
        body {
            background-color: #18191A;
            color: #FFFFFF;
            font-family: "Lora", serif;
            display: flex;
            height: calc(100vh - 2vmax);
            width: calc(100vw - 2vmax);
            margin: 1vmax;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 15px;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: #FFFFFF;
        }

        a i {
            text-align: center;
        }

        textarea {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100% - 50px);
            height: calc(100% - 50px);
            border: none;
            background-color: #18191A;
            color: #FFFFFF;
            font-family: monospace;
            font-size: 16px;
            resize: none;
            padding: 25px;
            display: none;
            text-wrap-mode: nowrap;
        }

        button {
            position: fixed;
            right: 25px;
            bottom: 25px;
            width: 45px;
            height: 45px;
            border-radius: 100%;
            border: none;
            cursor: pointer;
            background: #212121;
            box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
            transition: background 0.15s, color 0.15s;
            color: var(--base_color);
        }

        button:hover {
            background: var(--base_color);
            color: #FFFFFF;
        }

        button:active {
            background: #212121;
            color: var(--base_color);
        }

        button i {
            font-size: 17px;
            line-height: 0;
        }

        button i::before {
            line-height: normal !important;
        }
    </style>
</head>

<body>
    <textarea></textarea>
    <button style="--base_color: #F7B928;"><i class="fi fi-br-magic-wand"></i></button>
    <script>
        if (localStorage.getItem("PPUPs_tcn"))
            for (let item of localStorage.getItem("PPUPs_tcn").split("\n")) {
                let [text, icon_name, icon_color, url] = item.split("|");
                document.body.appendChild(PPPL_JS.ADOM([
                    "a",
                    { "href": url, "target": "_top" },
                    null,
                    [
                        ["i", { "class": "fi fi-br-" + icon_name, "style": "color: " + icon_color + ";" },],
                        ["span", null, { "innerHTML": " " + text }]
                    ]
                ], document));
            }

        document.querySelector("button").onclick = () => {
            document.querySelector("button i").className = "fi fi-br-hexagon-check";
            document.querySelector("button").style = "--base_color: #45BD62;";
            document.querySelector("textarea").style.display = "block";
            document.querySelector("textarea").value = localStorage.getItem("PPUPs_tcn");
            document.querySelector("button").onclick = () => {
                localStorage.setItem("PPUPs_tcn", document.querySelector("textarea").value);
                location.reload();
            };
        };
    </script>
</body>

</html>
