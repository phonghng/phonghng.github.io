<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHP_TOTP</title>
    <link rel="shortcut icon" href="../images/NHP_TOTP.png" type="image/x-icon">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jssha@3.3.1/dist/sha.min.js"></script>

    <link rel="stylesheet" href="../stylesheets/NHP_TOTP.css">
</head>

<body>
    <div style="text-align: center;">
        <h1>
            NHP_TOTP
        </h1>
    </div>

    <h2>Giải mã</h2>
    <div class="box" id="decrypt">
        <input type="password" id="decrypt_password" placeholder="Nhập mật khẩu để giải mã..." />
        <button onclick="javascript:decrypt();" id="decrypt_button">Giải mã</button>
        <div id="otp_list"></div>
    </div>

    <h2>Mã hoá</h2>
    <div class="box" id="encrypt">
        <textarea id="string_need_encrypt" placeholder="Chuỗi cần mã hoá..."></textarea>
        <input type="password" id="encrypt_password" placeholder="Nhập mật khẩu để giải mã..." />
        <button onclick="javascript:encrypt();" id="encrypt_button">Mã hoá</button>
        <textarea id="encrypt_result" placeholder="Chuỗi đã mã hoá..."></textarea>
    </div>

    <script src="../scripts/NHO_TOTP.js"></script>
</body>

</html>
