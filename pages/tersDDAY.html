<!DOCTYPE html>
<html>

<head>
    <title>tersDDAY</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="../images/tersDDAY.png" type="image/x-icon">

    <script src="https://phonghng.github.io/scripts/libraries/PPPL-JS.js"></script>
    <link rel="stylesheet" href="https://phonghng.github.io/stylesheets/PPPL-CSS.css">

    <script src="../scripts/libraries/moment.min.js"></script>

    <style>
        .item {
            border-radius: 10px;
            background-color: var(--GREY_3);
            padding: 15px;
            margin: 10px;
            display: grid;
            grid-template-columns: 1fr max-content;
            grid-template-rows: 1fr;
            gap: 0px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                "title countdown";
        }

        .item .title {
            grid-area: title;
            font-size: 16px;
            display: inline;
            align-content: center;
        }

        .item .countdown {
            grid-area: countdown;
            font-size: 18px;
            font-weight: bold;
            float: right;
            text-transform: uppercase;
            display: inline;
            align-content: center;
        }
    </style>
</head>

<body>
    <div class="item" data-date="2024-08-02">
        <div class="title">Thi Hùng Vương</div>
        <div class="countdown"></div>
    </div>

    <script>
        let items = document.querySelectorAll(".item");
        let today_moment =
            moment()
                .set("hour", 0)
                .set("minute", 0)
                .set("second", 0)
                .set("millisecond", 0);
        for (let item of items) {
            let countdown = today_moment.diff(moment(item.dataset.date), "d");

            let display_text = today_moment.diff(moment(item.dataset.date), "d");
            if (countdown > 0) display_text = "D+" + countdown;
            else if (countdown == 0) display_text = "D-Day";
            else display_text = "D" + countdown;

            let display_color;
            if (countdown > 0) display_color = "var(--LIME)";
            else if (countdown == 0) display_color = "var(--BLUE)";
            else if (countdown >= -1) display_color = "var(--CHERRY)";
            else if (countdown >= -3) display_color = "var(--TOMATO)";
            else if (countdown >= -7) display_color = "var(--LEMON)";
            else display_color = "var(--WHITE)";

            item.querySelector(".countdown").innerText = display_text;
            item.querySelector(".countdown").style.color = display_color;
        }
    </script>
</body>

</html>
