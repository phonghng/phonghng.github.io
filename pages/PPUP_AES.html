<!DOCTYPE html>
<html>

<head>
	<title>PPUP-AES</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="../images/PPUP_AES.png" type="image/x-icon">

	<script src="https://phonghng.github.io/scripts/libraries/PPPL-JS.js"></script>
	<link rel="stylesheet" href="https://phonghng.github.io/stylesheets/PPPL-CSS.css">

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.22/jsrsasign-all-min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
	<script src="../scripts/libraries/crypto-js.4.2.0.min.js"></script>
	<link rel="stylesheet" href="../stylesheets/PPUP_AES.css">
</head>

<body>
	<div id="wrapper">
		<div id="sub_wrapper">
			<div id="container">
				<input type="file" id="file_uploader" accept=".pdf" />
				<input type="password" id="password" placeholder="Mật khẩu (đối với tính năng kí)" />
				<button id="sign_submit">Kí</button>
				<button id="verify_submit">Xác thực</button>
				<span id="result" style="background-color: var(--BLUE);">
					<img src="../images/PPUP_AES.png" /> PPUP-AES – Công cụ kí và xác thực PDF bằng chữ kí điện tử của <a href="https://phonghng.github.io/">PhongHNg</a>
				</span>
			</div>
		</div>
	</div>
	<script src="../scripts/PPUP_AES.js"></script>
</body>

</html>
