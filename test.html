<body>
    <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>
    <style>
        body {
            background-color: black;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>

    <script>
        const fireworks = new Fireworks.default(document.querySelector("body"));

        function run_script(script_array, fireworks_class, canvas, index = 0) {
            const MILLISECONDS_IN_SECOND = 1000;

            let timeout = script_array[index][0];
            let argument = script_array[index][1];

            setTimeout(
                () => {
                    switch (argument) {
                        case "show":
                            canvas.style.display = "block";
                            break;
                        case "start":
                            fireworks_class.start();
                            break;
                        case "stop":
                            fireworks_class.waitStop();
                            break;
                        case "hide":
                            canvas.style.display = "none";
                            break;
                        default:
                            if (typeof argument == "number")
                                fireworks_class.launch(argument);
                            else if (typeof argument == "object")
                                fireworks_class.updateOptions(argument); // TODO: Merge options
                            break;
                    }

                    if (index < script_array.length - 1)
                        run_script(script_array, fireworks_class, canvas, index + 1);
                },
                timeout * MILLISECONDS_IN_SECOND
            );
        }

        run_script(
            [
                [0, "show"],
                [0, {
                    sound: {
                        enabled: true,
                        files: [
                            "https://fireworks.js.org/sounds/explosion0.mp3",
                            "https://fireworks.js.org/sounds/explosion1.mp3",
                            "https://fireworks.js.org/sounds/explosion2.mp3"
                        ],
                        volume: {
                            min: 5,
                            max: 10
                        }
                    }
                }],
                [1, {
                    rocketsPoint: {
                        min: 0,
                        max: 0
                    }
                }],
                [0, 100],
                [0, {
                    rocketsPoint: {
                        min: 50,
                        max: 50
                    }
                }],
                [0, 100],
                [0, {
                    rocketsPoint: {
                        min: 100,
                        max: 100
                    }
                }],
                [0, 100],
                [0, "stop"],
                [0, {
                    rocketsPoint: {
                        min: 50,
                        max: 50
                    }
                }],
                [25, "start"],
                [15, "stop"],
                [0, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [3, 50],
                [5, 1],
                [1, 1],
                [1, 1],
                [1, 1],
                [1, 1],
                [0, "stop"],
                [5, "start"],
                [0, {
                    intensity: 100,
                    explosion: 10,
                    gravity: 1,
                    decay: {
                        min: 0.01,
                        max: 0.01
                    },
                    rocketsPoint: {
                        min: 0,
                        max: 100
                    }
                }],
                [10, {
                    hue: {
                        min: 0,
                        max: 0
                    }
                }],
                [10, {
                    hue: {
                        min: 60,
                        max: 60
                    }
                }],
                [10, {
                    hue: {
                        min: 120,
                        max: 120
                    }
                }],
                [10, {
                    hue: {
                        min: 180,
                        max: 180
                    }
                }],
                [10, {
                    hue: {
                        min: 240,
                        max: 240
                    }
                }],
                [10, {
                    hue: {
                        min: 300,
                        max: 300
                    }
                }],
                [15, "stop"],
                [0, {
                    hue: {
                        min: 0,
                        max: 360
                    }
                }],
                [5, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [1, 15],
                [0, "stop"],
                [15, {
                    friction: 0.75,
                    gravity: 0,
                    traceLength: 1,
                    rocketsPoint: {
                        min: 0,
                        max: 100
                    },
                    lineWidth: {
                        explosion: {
                            min: 7,
                            max: 10
                        },
                        trace: {
                            min: 7,
                            max: 10
                        }
                    }
                }],
                [0, 100],
                [3, {
                    friction: 0.75,
                    gravity: 5,
                    rocketsPoint: {
                        min: 0,
                        max: 100
                    },
                    traceLength: 3,
                    lineWidth: {
                        explosion: {
                            min: 1,
                            max: 4
                        },
                        trace: {
                            min: 0.1,
                            max: 1
                        }
                    }
                }],
                [0, 100],
                [15, {
                    friction: 1,
                    intensity: 30,
                    explosion: 50,
                    gravity: 1,
                    decay: {
                        min: 0.0005,
                        max: 0.0005
                    },
                    rocketsPoint: {
                        min: 0,
                        max: 100
                    },
                    lineWidth: {
                        explosion: {
                            min: 7,
                            max: 10
                        },
                        trace: {
                            min: 7,
                            max: 10
                        }
                    },
                    sound: {
                        volume: {
                            min: 99,
                            max: 100
                        }
                    }
                }],
                [0, 1],
                [5, 1],
                [5, 1],
                [5, 1],
                [5, 1],
                [25, {
                    friction: 0.95
                }],
                [0, 50],
                //[0, "hide"],
            ],
            fireworks,
            document.querySelector("canvas")
        );
    </script>
</body>
