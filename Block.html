<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block</title>

    <script>
        class Game {
            constructor() {
                this.firms = [];
            }

            new_firm(name) {
                let firm = new Firm(name);
                firm.callbacks = {
                    get_all_product: () => this.get_all_product(),
                    get_highest_cost: () => this.get_highest_cost_product(),
                    get_lowest_price_in_same_cost: (cost) => this.get_lowest_price_in_same_cost_product(cost),
                    get_firm_market_share: (firm) => this.get_firm_market_share(firm)
                };
                return this.firms.push(firm);
            }

            get_all_product() {
                let all_product = [];
                this.firms.forEach(firm => {
                    firm.products.forEach(product => {
                        all_product.push(product);
                    });
                });
                return all_product;
            }

            get_highest_cost_product() {
                let all_product = this.get_all_product();
                let highest_cost = 0;
                all_product.forEach(product => {
                    if (product.cost > highest_cost) {
                        highest_cost = product.cost;
                    }
                });
                return highest_cost;
            }

            get_lowest_price_in_same_cost_product(cost) {
                let all_product = this.get_all_product();
                let lowest_price = undefined;
                all_product.forEach(product => {
                    if (
                        product.cost == cost
                        && (!lowest_price || product.price < lowest_price)
                    ) {
                        lowest_price = product.price;
                    }
                });
                return lowest_price;
            }

            get_firm_market_share(firm) {
                let game_total_in_circulation = 0;
                let all_product = this.get_all_product();
                all_product.forEach(product => {
                    game_total_in_circulation += product.in_circulation;
                });

                let firm_total_in_circulation = 0;
                firm.products.forEach(product => {
                    firm_total_in_circulation += product.in_circulation;
                });

                return firm_total_in_circulation / game_total_in_circulation;
            }

            adjustment_all() {
                let all_product = this.get_all_product();
                all_product.forEach(product => {
                    product.adjustment_in_circulation();
                });
            }

            generate_data() {
                let firms = [];
                this.firms.forEach((firm, index) => {
                    firms.push({
                        index: index,
                        name: firm.name,
                        money: firm.calculate_money(),
                        disabled: firm.disabled
                    });
                });

                let products = [];
                this.get_all_product().forEach(product => {
                    products.push({
                        firm: {
                            index: this.firms.indexOf(product.firm),
                            name: product.firm.name,
                            disabled: product.firm.disabled,
                        },
                        index: this.firms[this.firms.indexOf(product.firm)].products.indexOf(product),
                        name: product.name,
                        cost: product.cost,
                        price: product.price,
                        in_circulation: product.in_circulation,
                        disabled: product.disabled
                    });
                });

                return { firms, products };
            }
        }

        class Firm {
            constructor(name) {
                this.name = name;

                this.products = [];

                this.disabled = false;

                this.callbacks = undefined;
            }

            new_product(name, cost, price) {
                if (this.disabled) {
                    return false;
                }

                let product = new Product(this, name, cost, price);
                product.callbacks = this.callbacks;
                return this.products.push(product);
            }

            calculate_money() {
                let money = 0;
                this.products.forEach(product => {
                    money += (product.price - product.cost) * product.in_circulation;
                });
                return money;
            }
        }

        class Product {
            constructor(firm, name, cost, price) {
                this.firm = firm;

                this.name = name;
                this.cost = cost;
                this.price = price;

                this.in_circulation = 0;

                this.disabled = false;

                this.callbacks = undefined;
            }

            adjustment_in_circulation() {
                if (this.disabled || this.firm.disabled) {
                    return false;
                }

                let highest_cost = this.callbacks.get_highest_cost();
                let lowest_price_in_same_cost =
                    this.callbacks.get_lowest_price_in_same_cost(this.cost);
                let firm_market_share = this.callbacks.get_firm_market_share(this.firm);

                let adjustment_rate =
                    (
                        (this.cost / highest_cost)
                        + (lowest_price_in_same_cost / this.price)
                        + (firm_market_share / 5)
                        + (Math.random() / 7)
                    ) / (1 + 1 + 1/5 + 1/7) / 15;
                let adjustment_amount = Math.floor(this.in_circulation * adjustment_rate) || 1;

                let before_adjustment = this.in_circulation;
                this.in_circulation += adjustment_amount;
                let after_adjustment = this.in_circulation;

                return { before_adjustment, adjustment_amount, after_adjustment };
            }
        }

        class UI {
            constructor(game, new_firm_button) {
                this.game = game;

                new_firm_button.onclick = () => {
                    let name = prompt("Nhập tên hãng:");
                    if (name) {
                        this.game.new_firm(name);
                        this.update();
                    }
                }
            }

            display_firms() {
                let firms_table_body = document.querySelector("#firms_table tbody");

                while (firms_table_body.firstChild) {
                    firms_table_body.firstChild.remove();
                }

                let firms_data = this.game.generate_data().firms;

                firms_data.sort((a, b) => b.money - a.money);

                firms_data.forEach((firm_data) => {
                    let tr_element = document.createElement("tr");

                    if (firm_data.disabled) {
                        tr_element.style.opacity = 0.5;
                    }

                    /* [START] Basic info */
                    let table_row_datas = [
                        firm_data.name,
                        firm_data.money.toLocaleString()
                    ];

                    table_row_datas.forEach(data => {
                        let td_element = document.createElement("td");
                        td_element.innerHTML = data;
                        tr_element.appendChild(td_element);
                    });
                    /* [END] Basic info */

                    /* [START] Action buttons */
                    let action_buttons_td_element = document.createElement("td");
                    action_buttons_td_element.style.display = "flex";
                    action_buttons_td_element.style.gap = "15px";

                    let action_buttons_function_arguments = [
                        action_buttons_td_element,
                        firm_data.index
                    ];

                    this.add_new_product_button(...action_buttons_function_arguments);
                    this.add_remove_firm_button(...action_buttons_function_arguments);
                    this.add_disable_firm_button(...action_buttons_function_arguments);

                    tr_element.appendChild(action_buttons_td_element);
                    /* [END] Action buttons */

                    firms_table_body.appendChild(tr_element);
                });
            }

            add_new_product_button(td_element, firm_index) {
                let button = document.createElement("button");
                button.innerHTML = "Thêm sản phẩm";
                button.onclick = () => {
                    let name = prompt("Nhập tên sản phẩm:");
                    let cost = Number(prompt("Nhập chi phí (đ):"));
                    let price = Number(prompt("Nhập giá bán (đ):"));
                    if (name && cost && price) {
                        this.game.firms[firm_index].new_product(name, cost, price);
                    }
                    this.update();
                }
                td_element.appendChild(button);
            }

            add_remove_firm_button(td_element, firm_index) {
                let button = document.createElement("button");
                button.innerHTML = "Xoá";
                button.onclick = () => {
                    if (confirm("Bạn có chắc muốn xoá hãng này?")) {
                        this.game.firms.splice(firm_index, 1);
                        this.update();
                    }
                }
                td_element.appendChild(button);
            }

            add_disable_firm_button(td_element, firm_index) {
                let firm_data = this.game.firms[firm_index];
                let button = document.createElement("button");
                button.innerHTML = firm_data.disabled ? "Tiếp tục" : "Đình chỉ";
                button.onclick = () => {
                    firm_data.disabled = !firm_data.disabled;
                    this.update();
                }
                td_element.appendChild(button);
            }

            display_products() {
                let products_table_body = document.querySelector("#products_table tbody");

                while (products_table_body.firstChild) {
                    products_table_body.firstChild.remove();
                }

                let products_data = this.game.generate_data().products;

                products_data.sort((a, b) => b.in_circulation - a.in_circulation);

                products_data.forEach((product_data) => {
                    let tr_element = document.createElement("tr");

                    if (product_data.disabled || product_data.firm.disabled) {
                        tr_element.style.opacity = 0.5;
                    }

                    /* [START] Basic info */
                    let table_row_datas = [
                        product_data.firm.name,
                        product_data.name,
                        product_data.cost.toLocaleString(),
                        product_data.price.toLocaleString(),
                        product_data.in_circulation.toLocaleString()
                    ];

                    table_row_datas.forEach(data => {
                        let td_element = document.createElement("td");
                        td_element.innerHTML = data;
                        tr_element.appendChild(td_element);
                    });
                    /* [END] Basic info */

                    /* [START] Action buttons */
                    let action_buttons_td_element = document.createElement("td");
                    action_buttons_td_element.style.display = "flex";
                    action_buttons_td_element.style.gap = "15px";

                    let action_buttons_function_arguments = [
                        action_buttons_td_element,
                        product_data.firm.index,
                        product_data.index
                    ];

                    this.add_remove_product_button(...action_buttons_function_arguments);
                    this.add_disable_product_button(...action_buttons_function_arguments);

                    tr_element.appendChild(action_buttons_td_element);
                    /* [END] Action buttons */

                    products_table_body.appendChild(tr_element);
                });
            }

            add_remove_product_button(td_element, firm_index, product_index) {
                let button = document.createElement("button");
                button.innerHTML = "Xoá";
                button.onclick = () => {
                    if (confirm("Bạn có chắc muốn xoá sản phẩm này?")) {
                        this.game.firms[firm_index].products.splice(product_index, 1);
                        this.update();
                    }
                }
                td_element.appendChild(button);
            }

            add_disable_product_button(td_element, firm_index, product_index) {
                let product_data = this.game.firms[firm_index].products[product_index];
                let button = document.createElement("button");
                button.innerHTML = product_data.disabled ? "Tiếp tục" : "Đình chỉ";
                button.onclick = () => {
                    product_data.disabled = !product_data.disabled;
                    this.update();
                }
                td_element.appendChild(button);
            }

            update() {
                this.display_firms();
                this.display_products();
            }
        }
    </script>

    <style>
        :root {
            --BLUE: #1877F2;
            --CHERRY: #F3425F;
            --GRAPE: #9360F7;
            --LEMON: #F7B928;
            --LIME: #45BD62;
            --PINK: #FF66BF;
            --SEAFOAM: #54C7EC;
            --TEAL: #2ABBA7;
            --TOMATO: #FB724B;

            --BLACKWHITE_0: #ffffff;
            --BLACKWHITE_1: #fafafa;
            --BLACKWHITE_2: #ebebeb;
            --BLACKWHITE_3: #d0d0d0;
            --BLACKWHITE_4: #9e9e9e;
            --BLACKWHITE_5: #616161;
            --BLACKWHITE_6: #212121;
            --BLACKWHITE_7: #000000;

            --popup_boxShadow: 0 5px 10px rgb(0 0 0 / 20%);
            ;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 15px;
            font-size: 18px;
        }

        .box {
            padding: 10px;
            border-radius: 5px;
            text-align: justify;
            background-color: var(--BLACKWHITE_2);
        }

        .lv0_box {
            padding: 10px;
            border-radius: 5px;
            background-color: var(--BLACKWHITE_0);
        }

        .lv2_box {
            padding: 10px;
            border-radius: 5px;
            background-color: var(--BLACKWHITE_3);
        }

        .lv3_box {
            padding: 10px;
            border-radius: 5px;
            background-color: var(--BLACKWHITE_4);
        }

        input,
        select {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 5px;
            color: var(--BLACKWHITE_7);
            background-color: var(--BLACKWHITE_0);
        }

        textarea {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 5px;
            color: var(--BLACKWHITE_7);
            background-color: var(--BLACKWHITE_0);
        }

        input[type="checkbox"] {
            width: auto;
        }

        button {
            width: 100%;
            border: none;
            outline: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            color: var(--BLACKWHITE_7);
            background-color: var(--BLACKWHITE_0);
        }

        button:hover {
            background-color: var(--BLACKWHITE_1);
        }

        button:active {
            transform: scale(0.95);
        }

        button[disabled] {
            opacity: 0.5;
            cursor: not-allowed !important;
        }

        button[disabled]:active {
            transform: none !important;
        }

        a {
            cursor: pointer;
            color: var(--BLUE);
            text-decoration: none;
        }

        a:active {
            text-decoration: underline;
        }
    </style>

    <style>
        table {
            width: 100%;
            border-spacing: 15px;
        }

        th {
            padding: 10px;
            border-radius: 5px;
            text-transform: uppercase;
            color: var(--BLACKWHITE_0);
            background-color: var(--BLUE);
        }

        td {
            text-align: center;
        }

        button {
            background-color: var(--BLACKWHITE_2);
        }

        button:hover {
            background-color: var(--BLACKWHITE_3);
        }

        #new_firm_button {
            margin: 0 15px;
            width: calc(100% - 30px);
        }
    </style>
</head>

<body>
    <h1>Hãng</h1>
    <table id="firms_table">
        <thead>
            <tr>
                <th>Tên</th>
                <th>Tài sản (đ)</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button id="new_firm_button">Thêm hãng</button>

    <h1>Sản phẩm</h1>
    <table id="products_table">
        <thead>
            <tr>
                <th>Hãng</th>
                <th>Tên</th>
                <th>Phí (đ)</th>
                <th>Giá (đ)</th>
                <th>Lưu hành (Block)</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        let game = new Game();

        let new_firm_button = document.querySelector("#new_firm_button");
        let ui = new UI(game, new_firm_button);

        let game_interval = setInterval(() => {
            game.adjustment_all();
            ui.update();
        }, 1000);
    </script>
</body>

</html>
