<!DOCTYPE html>
<html>

<head>
    <title>Trình tạo PhongHNg VietQR Card</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://phonghng.github.io/scripts/libraries/qr-creator.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <style>
        html {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: sans-serif;
            display: grid;
            width: 100%;
            margin: 0;
            height: 100%;
            align-items: center;
            justify-items: center;
            align-content: center;
            background-image: url("https://media.istockphoto.com/id/1401126607/vi/anh/khung-c%E1%BA%A3nh-tr%C3%AAn-kh%C3%B4ng-c%E1%BB%A7a-nh%E1%BB%AFng-t%C3%B2a-nh%C3%A0-ch%E1%BB%8Dc-tr%E1%BB%9Di-tuy%E1%BB%87t-%C4%91%E1%BA%B9p-d%E1%BB%8Dc-theo-d%C3%B2ng-s%C3%B4ng-tr%C3%AAn-b%E1%BA%A7u-tr%E1%BB%9Di.jpg?b=1&s=612x612&w=0&k=20&c=asOMI1dJyD6psJKKtvv7zYLJKfxoL6_aoX9DLQRlenk=");
            background-repeat: no-repeat;
            background-size: cover;
            backdrop-filter: brightness(0.25);
        }

        #container {
            background: linear-gradient(45deg, #00F260, #0575E6);
            padding: 15px;
            width: fit-content;
            height: fit-content;
            border-radius: 10px;
        }

        #main {
            width: fit-content;
            height: fit-content;
            display: grid;
            grid-template-columns: min-content max-content;
            grid-template-rows: min-content min-content;
            gap: 10px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                "logos logos"
                "QR_code options";
        }

        #logos {
            grid-area: logos;
            height: 25px;
            display: flex;
            justify-content: space-around;
            background: #FFFFFF;
            padding: 10px;
            border-radius: 10px;
        }

        #logos img {
            height: 100%;
        }

        #logos .splitter {
            height: 100%;
            width: 1px;
            background-color: #777777;
        }

        #QR_code {
            display: grid;
            grid-area: QR_code;
            text-align: center;
            align-self: center;
            background: #FFFFFF;
            padding: 15px;
            border-radius: 10px;
            height: fit-content;
        }

        #QR_code canvas {
            margin: auto;
            width: 200px;
        }

        #options {
            grid-area: options;
            font-weight: bold;
            align-self: center;
            background: #FFFFFF;
            padding: 15px;
            height: calc(100% - 30px);
            border-radius: 10px;
            overflow: auto;
            display: grid;
            align-content: space-between;
        }

        #options .option {
            display: flex;
            align-items: baseline;
            font-size: 20px;
        }

        #options span {
            color: #F12711;
        }

        #options input {
            font-family: sans-serif;
            border: none;
            font-size: 20px;
            padding: 0;
            font-weight: bold;
            width: 200px;
        }

        #options textarea {
            width: calc(100% - 12px);
            height: 70px;
            font-size: 20px;
            resize: none;
            border: none;
            font-family: sans-serif;
            font-weight: bold;
            padding: 0;
            text-align: justify;
            margin-top: 5px;
        }

        #options span {
            text-wrap: nowrap;
            margin-right: 3px;
            font-size: 16px;
        }

        #buttons {
            display: flex;
            gap: 25px;
            margin-top: 25px;
        }

        #buttons button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.25s;
        }

        #buttons button:hover {
            opacity: 0.5;
        }

        #buttons button:active {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="main">
            <div id="logos">
                <img
                    src="https://minisiteb.qltns.mediacdn.vn/280519326726475776/2022/8/19/service-logo-1-16608733552441097435487.png" />
                <div class="splitter"></div>
                <img
                    src="https://api.codetabs.com/v1/proxy/?quest=https://i.gyazo.com/566d62fd25cf0867e0033fb1b9b47927.png" />
                <div class="splitter"></div>
                <img
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Logo_BIDV.svg/2560px-Logo_BIDV.svg.png" />
                <div class="splitter"></div>
                <img src="https://phonghng.github.io/images/PhongHNg.png" />
            </div>
            <div id="QR_code"></div>
            <div id="options">
                <div class="option">
                    <span>Số tài khoản:</span>PHONGHNG
                </div>
                <div class="option">
                    <span>Tên tài khoản:</span>NGUYEN HAI PHONG
                </div>
                <div class="option">
                    <span>Số tiền chuyển:</span>
                    <input type="text" min="0" />
                </div>
                <div class="option" style="display: block;">
                    <span>Lời nhắn:</span>
                    <textarea spellcheck="false"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="buttons">
        <button onclick="javascript:download_as_png();" style="background-color: #00F260;">Tải xuống (PNG)</button>
        <button onclick="javascript:copy_to_clipboard(this);" style="background-color: #0575E6;">Sao chép</button>
    </div>

    <script>
        const DEFAULT_LAST_TWO_BIN_DIGIT = "18";
        const DEFAULT_MID_CID = "PHONGHNG";
        const DEFAULT_MERCHANT_CONSUMER_NAME = "NGUYEN HAI PHONG";
        const DEFAULT_SERVICE_SHORT_CODE = "A";

        let amount_input = document.querySelector("#options input");
        let message_input = document.querySelector("#options textarea");

        function remove_Vietnamese_tones(string) {
            string = string.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            string = string.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            string = string.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            string = string.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            string = string.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            string = string.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            string = string.replace(/đ/g, "d");
            string = string.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            string = string.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            string = string.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            string = string.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            string = string.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            string = string.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            string = string.replace(/Đ/g, "D");
            string = string.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, "");
            string = string.replace(/\u02C6|\u0306|\u031B/g, "");
            string = string.replace(/!|@|%|\^|\*|\(|\)|\+|\=|\<|\>|\?|\/|,|\.|\:|\;|\'|\"|\&|\#|\[|\]|~|\$|_|`|-|{|}|\||\\/g, " ");
            return string;
        }

        function generate_QR_code_data(
            amount,
            message,
            last_two_BIN_digit = DEFAULT_LAST_TWO_BIN_DIGIT,
            MID_CID = DEFAULT_MID_CID,
            service_short_code = DEFAULT_SERVICE_SHORT_CODE,
        ) {
            function crc16_ccitt_false(str) {
                const POLY = 0x1021;
                const START = 0xFFFF;

                function get_crc_for_num(i) {
                    let crc = 0;
                    let c = i * 256;
                    [...Array(8).keys()].forEach(_ => {
                        crc = ((crc ^ c) & 0x8000) ? (crc * 2) ^ POLY : crc * 2;
                        c = c * 2
                    });
                    return crc;
                }

                let table = [...Array(256).keys()].map((_, n) => get_crc_for_num(n));
                let crc = START;
                str.split('').forEach(c => {
                    crc = (crc * 0x100) ^ table[(((crc / 0x100) >> 0) ^ c.charCodeAt()) & 0xFF];
                    crc = (((crc / 0x10000) >> 0) * 0x10000) ^ crc;
                });
                return crc.toString(16);
            }

            const leading_zero = number => ("0" + number).substr(("0" + number).length - 2);
            let data = "";
            /**/ data += "000201";
            /**/ data += "010211";
            /**/ data += "38" + (44 + MID_CID.length);
            /*-----*/ data += "0010A000000727";
            /*-----*/ data += "01" + (14 + MID_CID.length);
            /*----------*/ data += "00069704" + last_two_BIN_digit;
            /*----------*/ data += "01" + leading_zero(MID_CID.length) + MID_CID;
            /*-----*/ data += "0208QRIBFTT" + service_short_code;
            /**/ data += "5303704";
            /**/ data += amount ? "54" + leading_zero(amount.length) + amount : "";
            /**/ data += "5802VN";
            /**/ data += message ? "62" + (message.length + 4) + "08" + leading_zero(message.length) + message : "";
            /**/ data += "6304";
            /**/ data += crc16_ccitt_false(data).toUpperCase();
            return data;
        }

        function update_QR_code() {
            let QR_code_container = document.querySelector("#QR_code");
            if (QR_code_container.firstChild)
                QR_code_container.removeChild(QR_code_container.firstChild);
            let data = generate_QR_code_data(
                amount_input.value.toString(),
                remove_Vietnamese_tones(message_input.value)
            );
            QrCreator.render({
                text: data,
                radius: 0,
                ecLevel: "H",
                size: 250
            }, document.querySelector("#QR_code"));
        }

        function download_as_png() {
            htmlToImage.toPng(document.querySelector("#container")).then(data_URL => {
                let anchor_element = document.createElement("a");
                anchor_element.href = data_URL;
                anchor_element.download =
                    "PhongHNg_VietQR_Card"
                    + (amount_input.value ? "__" + amount_input.value : "")
                    + (message_input.value ? "__" + remove_Vietnamese_tones(message_input.value) + ".png" : "");
                anchor_element.click();
            });
        }

        function copy_to_clipboard(button_element) {
            function data_URI_to_Blob(data_URI) {
                let byte_string = atob(data_URI.split(",")[1]);
                let mime_string = data_URI.split(",")[0].split(":")[1].split(";")[0];
                let ab = new ArrayBuffer(byte_string.length);
                let ia = new Uint8Array(ab);
                for (let i = 0; i < byte_string.length; i++)
                    ia[i] = byte_string.charCodeAt(i);
                let blob = new Blob([ab], { type: mime_string });
                return blob;
            }

            try {
                htmlToImage.toPng(document.querySelector("#container")).then(data_URL => {
                    navigator.clipboard.write([
                        new ClipboardItem({
                            "image/png": data_URI_to_Blob(data_URL)
                        })
                    ]);
                });

                let button_orginal_text = button_element.innerText;
                button_element.innerText = "Đã sao chép!";
                setTimeout(() => {
                    button_element.innerText = button_orginal_text;
                }, 1000);
            } catch (error) {
                let button_orginal_text = button_element.innerText;
                button_element.innerText = "Đã xảy ra lỗi...";
                setTimeout(() => {
                    button_element.innerText = button_orginal_text;
                }, 1000);
            }
        }

        amount_input.onchange = () => update_QR_code();
        message_input.onchange = () => update_QR_code();
        amount_input.onfocus = () => {
            if (amount_input.value == "") return;
            amount_input.value = parseInt(amount_input.value.replace(/ | ₫/g, ""));
            amount_input.type = "number";
        };
        amount_input.onblur = () => {
            if (amount_input.value == "") return;
            let value = parseInt(amount_input.value);
            amount_input.type = "text";
            amount_input.value =
                new Intl.NumberFormat("vi-VN", { style: "currency", currency: "VND" })
                    .format(value)
                    .replace(/\./g, " ");
        };
        update_QR_code();
    </script>
</body>

</html>
