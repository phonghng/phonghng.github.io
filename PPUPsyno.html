<!DOCTYPE html>
<html>

<head>
    <title></title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="./images/PPUPsyno.png" type="image/x-icon">

    <script src="https://phonghng.github.io/scripts/libraries/PPPL-JS.js"></script>
    <link rel="stylesheet" href="https://phonghng.github.io/stylesheets/PPPL-CSS.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>

    <style>
        html,
        body {
            height: 100%;
        }

        #textarea {
            outline: none;
            background-color: transparent;
            font-family: system-ui;
            resize: none;
            transition: all .5s;
            filter: blur(3px);
            padding: 10px;
            line-height: normal;
            height: 100%;
            text-align: justify;
        }

        #textarea * {
            font: revert;
        }

        #textarea:hover,
        #textarea:focus {
            filter: blur(0);
        }

        #textarea:empty::before {
            content: attr(placeholder);
            color: #555555;
        }

        #textarea:empty:focus::before {
            content: "";
        }

        p\:h1 {
            font-size: xx-large !important;
            font-weight: bold !important;
        }

        p\:h2 {
            font-size: x-large !important;
            font-weight: bold !important;
        }

        p\:h3 {
            font-size: large !important;
            font-weight: bold !important;
        }

        p\:h4 {
            font-size: small !important;
            font-weight: bold !important;
        }

        p\:h5 {
            font-size: x-small !important;
            font-weight: bold !important;
        }

        p\:h6 {
            font-size: xx-small !important;
            font-weight: bold !important;
        }

        p\:note {
            margin: 0 0 10px 0;
            display: block;
            box-shadow: 5px 5px 10px 0 var(--GREY_2);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--GREY_1);
        }
    </style>
</head>

<body>
    <div id="textarea" contenteditable placeholder="Nhập ghi chú..."></div>

    <script>
        let textarea = document.querySelector("#textarea");
        if (localStorage.getItem("PPUPsyno"))
            textarea.innerHTML = localStorage.getItem("PPUPsyno").replace(/&lt;(\/*)p:(note|h1|h2|h3|h4|h5|h6)&gt;/g, "<$1p:$2>");;
        textarea.addEventListener("input", () => localStorage.setItem("PPUPsyno", textarea.innerHTML));
    </script>
</body>

</html>
