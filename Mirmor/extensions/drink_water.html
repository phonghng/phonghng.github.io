<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">

    <style>
        #cup_list {
            text-align: center;
        }

        .water_icon {
            display: inline;
            user-select: none;
            cursor: not-allowed;
            transition: width 1s;
        }

        @media only screen and (max-width: 600px) {
            .water_icon {
                width: calc(100% / 3);
            }
        }

        @media only screen and (min-width: 600px) {
            .water_icon {
                width: calc(100% / 5);
            }
        }

        .water_icon:active {
            transform: scale(0.95);
        }

        .water_icon path {
            fill: var(--BLUE);
        }

        .water_icon text {
            fill: white;
            font-size: 65px;
            color: white;
            font-weight: bold;
        }

        #goal_ml {
            user-select: none;
            cursor: default;
        }

        #goal_ml path {
            fill: #9e9e9e;
            transition: fill 1s;
        }

        #demo_water_icon {
            display: none;
        }

        #new_cup {
            user-select: none;
            cursor: pointer;
        }

        #new_cup path {
            fill: var(--LIME);
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="water_icon" id="demo_water_icon">
        <path
            d="M256,43.91s-144,158.3-144,270.3c0,88.36,55.64,144,144,144s144-55.64,144-144C400,202.21,256,43.91,256,43.91Zm16,362.3v-24a60.07,60.07,0,0,0,60-60h24A84.09,84.09,0,0,1,272,406.21Z" />
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle">0ml</text>
    </svg>

    <div id="cup_list">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="water_icon" id="goal_ml">
            <title>Mục tiêu: <span id="goal_ml_number"></span>ml</title>
            <path
                d="M256,43.91s-144,158.3-144,270.3c0,88.36,55.64,144,144,144s144-55.64,144-144C400,202.21,256,43.91,256,43.91Zm16,362.3v-24a60.07,60.07,0,0,0,60-60h24A84.09,84.09,0,0,1,272,406.21Z" />
            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle">3000ml</text>
        </svg>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="water_icon" id="new_cup">
            <path
                d="M256,43.91s-144,158.3-144,270.3c0,88.36,55.64,144,144,144s144-55.64,144-144C400,202.21,256,43.91,256,43.91Zm16,362.3v-24a60.07,60.07,0,0,0,60-60h24A84.09,84.09,0,0,1,272,406.21Z" />
            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle">Thêm</text>
        </svg>
    </div>

    <script>
        document.getElementById("new_cup").addEventListener("click", () => {
            let milliliter = prompt("Nhập số ml muốn thêm:", "0");
            milliliter = Number(milliliter);
            if (milliliter > 0) {
                add_new_cup(milliliter);
            }
        });

        let data = {
            cups: {
                _example_timestamp: "number_of_milliliter",
            },
            point_per_ml: 0.01,
            goal_ml: 3000
        };

        document.querySelector("#goal_ml_number").innerHTML = data.goal_ml;

        function export_info() {
            let exported_info = {
                point: get_total_ml() * data.point_per_ml,
                goal_point: data.goal_ml * data.point_per_ml,
                data: data
            };
            update_status_bar(exported_info);
            return exported_info;
        }

        function update_status_bar(exported_info) {
            if (!document.querySelector("#status_bar")) {
                let status_bar = document.createElement("div");
                status_bar.id = "status_bar";
                document.body.appendChild(status_bar);
            }

            let time_full_string = new Date().toLocaleString();
            let time_short_string = new Date().toLocaleTimeString().replace(" ", "");
            let { point, goal_point } = exported_info;

            let status_bar_text = `<span title="${time_full_string}">[${time_short_string}]</span> Điểm hiện tại: ${point} / ${goal_point} (đạt ~${Math.round(point / goal_point * 100)}% so với mục tiêu)`;

            document.querySelector("#status_bar").innerHTML = status_bar_text;
            document.querySelector("#status_bar").style.display = "block";

            if (window.status_bar_timeout) {
                clearTimeout(window.status_bar_timeout);
            }
            window.status_bar_timeout = setTimeout(() => {
                document.querySelector("#status_bar").style.display = "none";
            }, 5000);
        }

        function get_total_ml() {
            let total_ml = 0;
            for (let key in data.cups) {
                if (Number(data.cups[key]) > 0) {
                    total_ml += Number(data.cups[key]);
                }
            }
            return total_ml;
        }

        function import_info(exported_info) {
            data = exported_info.data;
            for (let key in data.cups) {
                if (Number(data.cups[key]) > 0) {
                    add_new_cup(data.cups[key], key);
                }
            }
        }

        function add_new_cup(milliliter, custom_timestamp) {
            let water_icon = document.querySelector("#demo_water_icon").cloneNode(true);
            water_icon.id = "";
            water_icon.style.display = "inline-block";
            water_icon.dataset.timestamp = custom_timestamp || Date.now();
            water_icon.querySelector("text").textContent = milliliter + "ml";
            water_icon.onclick = () => {
                let delete_confirm = confirm(`Bạn có thực sự muốn xoá cốc ${milliliter}ml này?`);
                if (delete_confirm) {
                    water_icon.remove();
                    delete data.cups[water_icon.dataset.timestamp];
                    info_onchange();
                    check_goal_ml();
                }
            };

            let new_cup_button = document.querySelector("#new_cup");
            new_cup_button.parentNode.insertBefore(water_icon, new_cup_button);

            data.cups[water_icon.dataset.timestamp] = milliliter;
            info_onchange();

            check_goal_ml();

            return water_icon;
        }

        function check_goal_ml() {
            let goal_ml_path = document.querySelector("#goal_ml path");
            if (get_total_ml() >= data.goal_ml) {
                goal_ml_path.style.fill = "var(--LEMON)";
            } else {
                goal_ml_path.style.fill = "#9e9e9e";
            }
        }
    </script>
</body>

</html>
