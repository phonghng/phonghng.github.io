<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">

    <style>
        body {
            text-align: center;
        }

        .reading_item {
            display: grid;
            gap: 0px 10px;
            margin-bottom: 15px;
            grid-template-areas:
                ". . .";
            grid-template-rows: 1fr;
            grid-template-columns: 1fr 100px 50px;
        }

        .reading_item .delete_button {
            color: var(--CHERRY);
        }

        #add_more {
            color: var(--LIME);
            width: fit-content;
        }

        #add_more:hover {
            background-color: var(--BLACKWHITE_1);
        }

        #reading_goal {
            transition: background 1s;
        }
    </style>
</head>

<body>
    <div class="box" style="margin-bottom: 15px;" id="reading_goal">Mục tiêu đọc: <span id="reading_goal_number"></span>
        trang sách</div>
    <div id="reading_list"></div>
    <button id="add_more" title="Thêm dòng mới" onclick="add_new_line();">Thêm dòng mới</button>

    <script>
        let data = {
            reading_list: {
                _example_book_name: ["read_pages_number", "last_changed_time"]
            },
            total_pages: 0,
            point_per_pages: 3,
            goal_pages: 20
        };

        document.querySelector("#reading_goal_number").innerHTML = data.goal_pages;

        function export_info() {
            let exported_info = {
                point: data.point_per_pages * data.total_pages,
                goal_point: data.point_per_pages * data.goal_pages,
                data: data
            };
            update_status_bar(exported_info);
            return exported_info;
        }

        function update_status_bar(exported_info) {
            if (!document.querySelector("#status_bar")) {
                let status_bar = document.createElement("div");
                status_bar.id = "status_bar";
                document.body.appendChild(status_bar);
            }

            let time_full_string = new Date().toLocaleString();
            let time_short_string = new Date().toLocaleTimeString().replace(" ", "");
            let { point, goal_point } = exported_info;

            let status_bar_text = `<span title="${time_full_string}">[${time_short_string}]</span> Điểm hiện tại: ${point} / ${goal_point} (đạt ~${Math.round(point / goal_point * 100)}% so với mục tiêu)`;

            document.querySelector("#status_bar").innerHTML = status_bar_text;
            document.querySelector("#status_bar").style.display = "block";

            if (window.status_bar_timeout) {
                clearTimeout(window.status_bar_timeout);
            }
            window.status_bar_timeout = setTimeout(() => {
                document.querySelector("#status_bar").style.display = "none";
            }, 5000);
        }

        function import_info(exported_info) {
            data = exported_info.data;
            write_reading_list();
        }

        function write_reading_list() {
            for (let book in data.reading_list) {
                add_new_line(book, data.reading_list[book][0]);
            }
        }

        function update_reading_list() {
            data.total_pages = 0;

            let reading_items = reading_list.querySelectorAll(".reading_item");

            for (let i = 0; i < reading_items.length; i++) {
                let reading_item = reading_items[i];
                let book_name = reading_item.querySelector(".book_name").value;
                let read_pages = reading_item.querySelector(".read_pages").value;

                if (book_name.length > 0 && read_pages > 0) {
                    if (!data.reading_list[book_name]) {
                        data.reading_list[book_name] = [Number(read_pages), Date.now()];
                    } else if (data.reading_list[book_name][0] != Number(read_pages)) {
                        data.reading_list[book_name][0] = Number(read_pages);
                        data.reading_list[book_name][1] = Date.now();
                    }
                    data.total_pages += Number(read_pages);
                }
            }

            if (data.total_pages >= data.goal_pages) {
                reading_goal.style.backgroundColor = "var(--LEMON)";
            } else {
                reading_goal.style.backgroundColor = "";
            }

            info_onchange();
        }

        function add_new_line(book_name = "", read_pages = 0) {
            if (!Number(read_pages) && read_pages != 0) {
                return undefined;
            }

            let new_item = document.createElement("div");
            new_item.classList.add("box", "reading_item");

            let book_name_input = document.createElement("input");
            book_name_input.type = "text";
            book_name_input.classList.add("book_name");
            book_name_input.setAttribute("placeholder", "Tên cuốn sách...");
            book_name_input.setAttribute("title", "Tên cuốn sách");
            book_name_input.value = book_name;
            set_event_for_inputs(book_name_input);
            new_item.appendChild(book_name_input);

            let read_pages_input = document.createElement("input");
            read_pages_input.type = "number";
            read_pages_input.classList.add("read_pages");
            read_pages_input.setAttribute("placeholder", "Số trang đã đọc...");
            read_pages_input.setAttribute("title", "Số trang đã đọc");
            read_pages_input.min = 0;
            read_pages_input.value = read_pages;
            set_event_for_inputs(read_pages_input);
            new_item.appendChild(read_pages_input);

            let delete_button = document.createElement("button");
            delete_button.classList.add("delete_button");
            delete_button.setAttribute("title", "Xoá dòng này");
            delete_button.innerText = "Xoá";
            delete_button.onclick = () => {
                new_item.remove();
                let book_name = new_item.querySelector(".book_name").value;
                delete data.reading_list[book_name];
                update_reading_list();
            };
            new_item.appendChild(delete_button);

            document.querySelector("#reading_list").appendChild(new_item);

            update_reading_list();
        }

        function set_event_for_inputs(element) {
            let events = ["change", "keyup", "keydown", "keypress", "input"];
            for (let i = 0; i < events.length; i++) {
                element.addEventListener(events[i], () => update_reading_list());
            }
        }
    </script>
</body>

</html>
