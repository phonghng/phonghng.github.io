<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../javascripts/ui/status_bar.js"></script>
    
    <link rel="stylesheet" href="../stylesheets/general.css">

    <style>
        html {
            height: 100%;
        }

        body {
            height: calc(100% - 30px);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: min-content 1fr;
            gap: 10px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                "."
                ".";
            height: 100%;
        }

        #controller {
            display: grid;
            grid-template-columns: 1fr min-content;
            grid-template-rows: 1fr;
            gap: 10px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                ". .";
        }

        #random_button {
            width: fit-content;
            white-space: nowrap;
        }

        #quote {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            align-self: center;
        }

        #quote h3 {
            font-style: italic;
        }
    </style>
</head>

<body>

        <div class="box" id="controller">

        let quote_author_souce = document.querySelector("#quote h3");

            let category_option = document.createElement("option");
            category_option.value = category_name;
            category_option.innerHTML = category_name;
            category_select.appendChild(category_option);
        });
        random_button.onclick = display_random_quote;

        function display_random_quote() {
            let category_name = category_select.value;
            if (category_name == "") return;
            let category_quote = quote_database[category_name];
            let quote = category_quote[Math.floor(Math.random() * category_quote.length)];

            quote_main_content.innerHTML = `"${quote[0].replace(/\n/g, "<br>")}"`;
            if (quote[1]) {
                quote_author_souce.style.display = "block";
                quote_author_souce.innerHTML = `${quote[1]}`;
            } else {
                quote_author_souce.style.display = "none";
            }

            data.quotes_displayed[Date.now()] = quote;

            info_onchange();
        }

        function export_info() {
            let number_of_quotes_displayed = Object.entries(data.quotes_displayed).length - 1;
            let exported_info = {
                point: number_of_quotes_displayed * data.point_per_quote_displayed,
                goal_point: data.goal_quote_displayed * data.point_per_quote_displayed,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
    </script>
