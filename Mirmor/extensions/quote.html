<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../scripts/status_bar.js"></script>
    
    <link rel="stylesheet" href="../stylesheets/general.css">

    <style>
        html {
            height: 100%;
        }

        body {
            height: calc(100% - 30px);
        }

        #container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: min-content 1fr;
            gap: 10px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                "."
                ".";
            height: 100%;
        }

        #controller {
            display: grid;
            grid-template-columns: 1fr min-content;
            grid-template-rows: 1fr;
            gap: 10px 10px;
            grid-auto-flow: row;
            grid-template-areas:
                ". .";
        }

        #random_button {
            width: fit-content;
            white-space: nowrap;
        }

        #quote {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            align-self: center;
        }

        #quote h3 {
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="box" id="controller">
            <select id="category_select">
                <option value="" disabled>Chọn chủ đề...</option>
            </select>
            <button id="random_button">Quay ngẫu nhiên!</button>
        </div>
        <div id="quote">
            <h1>Chọn chủ đề phía trên rồi bấm nút "Quay ngẫu nhiên!"</h1>
            <h3>Mirmor</h3>
        </div>
    </div>

    <script>
        let quote_database = {
            "Truyền động lực": [
                ["Một thói quen xấu làm hỏng cả tá thói quen tốt", "Napoleon Hill"],
                ["Sông sâu tĩnh lặng, lúa chín cúi đầu", "Tục ngữ"],
                ["Sự cám dỗ lớn nhất vào đêm hôm trước của ngày chiến thắng"],
                ["Nói hay đấy, nhưng anh định làm gì?", "Shimon Peres nói với Shai Agassi"],
                ["Tôi sống ngày nào, cũng là vì đất nước ngày đó", "Võ Nguyên Giáp"],
                ["Đừng chọn sống an nhàn vào những năm tháng còn có thể chịu khổ được"],
                ["Nếu bạn thực sự muốn thành công, một là bạn giỏi nhất, hai là bạn phải là đứa đứng cạnh người giỏi nhất."],
                ["Đứng trên đỉnh núi, trên đầu bạn là cả trời sao"],
                ["Đại dương mênh mông sẽ không thể đánh chìm một con tàu nếu nước không tràn vào bên trong nó"],
                ["Đừng sợ đi chậm. Chỉ sợ đứng yên"],
                ["Quan điểm cho rằng nên tích luỹ năng lực kinh nghiệm trước khi mở một doanh nghiệp hoàn toàn không tồn tại", "Quốc gia khởi nghiệp"],
                ["Cuộc đời đa số mọi người đều thua bởi chữ: ĐỢI", "Giới hạn của bạn chỉ là xuất phát điểm của tôi"],
            ],
            "Kinh tế": [
                ["Nắm thông tin là nắm đằng chuôi", "Nguyễn Hải Phong (PhongHNg)"],
                ["Mãi mãi tinh thần khởi nghiệp", "Vingroup"],
                ["..., \"mọi chuyên gia chỉ là chuyên gia trong những chuyện đã có tiền lệ, không có chuyên gia cho những điều chưa xảy đến\". Để trở thành \"chuyên gia\" tương lai, tầm nhìn phải thay thế kinh nghiệm...", "Quốc gia khởi nghiệp"],
                ["Chúng tôi đã làm theo cách của người Israel: chúng tôi tranh cãi đến khi thắng mới thôi"],
                ["Một binh nhì có thể nói với vị tướng trong lúc luyện tập, rằng cách ông ta đang làm là sai, phải làm như thế này mới đúng", "Quốc gia khởi nghiệp"],
                ["Mức độ trao quyền hạn vượt cấp trong quân đội Israel thậm chí từng làm lãnh đạo các quốc gia ngạc nhiên", "Quốc gia khởi nghiệp"],
                ["Những người khác luôn giới thiệu về công ty của họ. Những người Israel luôn giới thiệu về đất nước Israel", "Quốc gia khởi nghiệp"],
                ["Và mỗi ngày đều kết thúc bằng một buổi họp căng thẳng khi mà mọi binh sĩ trong đơn vị - thuộc mọi cấp bậc - cùng ngồi lại để phân tích ngày hôm đó", "Quốc gia khởi nghiệp"],
                ["Nhiều sĩ quan cấp cao đã bị sa thải sau một cuộc chiến thành công", "Quốc gia khởi nghiệp"],
                ["Cách các thương hiệu đẳng cấp xây dựng thương hiệu: logo quả táo Apple, dòng chữ Supreme, giấy nháp Đại học Thanh Hoa"],
                ["Không phải loài mạnh nhất sẽ sống sót, cũng không phải là loài thông minh nhất, mà là loài thích ứng nhanh nhất với sự thay đổi.", "Charles Darwin"]
            ],
            "\"Hố đen cảm xúc\"": [
                ["Sáng đi học kiểm tra được 5 điểm. Trưa ăn vội bát mì rồi lại vào học. Tối làm thêm đến 11h30 bị đồng nghiệp cà khịa, khách nạt nộ. Về phòng, chuẩn bị ngủ thì mẹ gọi điện thoại đến: \"Hôm nay con có ổn không?\"", "Tiktoker @kiedaoo07"],
                ["Một ngày nào đó, ba mẹ sẽ không còn hiểu nổi phương hướng cuộc đời bạn. Họ chỉ có thể gọi điện nhắc bạn hãy giữ gìn sức khoẻ, rồi ngày ngày già đi và ngóng bạn về nhà.", "Tiktoker @tusach_tritue"],
                ["Mai này con cũng chỉ là Khách... Về thăm ngôi nhà từng ở hai mươi mấy năm!"],
                ["Đôi khi, không phải một người đã thay đổi, chỉ là mặt nạ của họ đã rơi xuống mà thôi"],
                ["Khi trưởng thành, bạn sẽ phát hiện ban có hai bàn tay, một là để giúp mình, hai là để giúp người"]
            ],
            "Hành xử": [
                ["Nếu họ không mời bạn, đừng hỏi để được tham gia cùng"],
                ["Đừng chiến thắng bằng cách tranh cãi, hãy đánh bại họ bằng nụ cười của bạn"],
                ["Mục tiêu của người lãnh đạo (...) là tối đa hoá sự chịu đựng - đồng thời khuyến khích sự bất đồng chính kiến", "Quốc gia khởi nghiệp"],
                ["Chúng tôi không cổ vũ bạn quá mức khi bạn làm tốt, nhưng cũng không giết chết bạn nếu chẳng may thất bại", "Quốc gia khởi nghiệp"],
                ["Mỗi khi gặp gỡ (…) tuyệt nhiên, chẳng có ai hỏi xem ta có hạnh phúc hay không?", "Health Ledger"],
                ["Khen về thứ người ta ít khi được khen", "Nguyễn Hải Phong (PhongHNg)"],
                ["Có đi với nhau bao lâu đâu", "HieuTV"],
                ["Người khôn ăn nói nửa chừng, để cho kẻ dại nửa mừng nửa lo"],
                ["”Một người hoàn hảo đến mức không có gì để chê, người ta thường chỉ cảm thấy ghen tị chứ không có thiện cảm”"]
            ]
        };
        quote_database = Object.assign(
            { "Tất cả": Object.values(quote_database).flat() },
            quote_database
        );

        let StatusBar_class = new StatusBar(document.body);

        let data = {
            database: quote_database,
            quotes_displayed: {
                _example_timestamp: ["quote_content", "author/source"]
            },
            point_per_quote_displayed: 5,
            goal_quote_displayed: 5
        };

        let category_select = document.querySelector("#category_select");
        let random_button = document.querySelector("#random_button");
        let quote_main_content = document.querySelector("#quote h1");
        let quote_author_souce = document.querySelector("#quote h3");

        Object.keys(quote_database).forEach(category_name => {
            let category_option = document.createElement("option");
            category_option.value = category_name;
            category_option.innerHTML = category_name;
            category_select.appendChild(category_option);
        });
        random_button.onclick = display_random_quote;

        function display_random_quote() {
            let category_name = category_select.value;
            if (category_name == "") return;
            let category_quote = quote_database[category_name];
            let quote = category_quote[Math.floor(Math.random() * category_quote.length)];

            quote_main_content.innerHTML = `"${quote[0].replace(/\n/g, "<br>")}"`;
            if (quote[1]) {
                quote_author_souce.style.display = "block";
                quote_author_souce.innerHTML = `${quote[1]}`;
            } else {
                quote_author_souce.style.display = "none";
            }

            data.quotes_displayed[Date.now()] = quote;

            info_onchange();
        }

        function import_info(exported_data) {
            data.quotes_displayed = exported_data.quotes_displayed;
        }

        function export_info() {
            let number_of_quotes_displayed = Object.entries(data.quotes_displayed).length - 1;
            let exported_info = {
                point: number_of_quotes_displayed * data.point_per_quote_displayed,
                goal_point: data.goal_quote_displayed * data.point_per_quote_displayed,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
    </script>
</body>

</html>
