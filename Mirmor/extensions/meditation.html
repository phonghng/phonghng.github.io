<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">

    <style>
        .box {
            margin-bottom: 15px;
        }

        .counter {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 0px 10px;
            grid-template-areas:
                ". . .";
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="box">Tìm nơi yên tĩnh và thoải mái để ngồi. Ngồi thẳng và bắt chéo chân, có thể nhắm mắt hoặc nhìn xuống
        sàn.</div>
    <div class="box">Tập trung vào hơi thở của mình, nếu có những suy nghĩ xuất hiện trong đầu thì chỉ đon giản nhận
        biết chúng, để chúng ra khỏi tâm trí và hướng sự tập trung vào hơi thở.</div>

    <div class="box">
        <div class="counter">
            <button style="color: var(--LIME);" id="counter_start_button" onclick="start_counter();">Bắt đầu</button>
            <div class="lv3_box" id="counter_timer"></div>
            <button style="color: var(--TOMATO);" id="counter_end_button" onclick="end_counter();" disabled>Kết
                thúc</button>
        </div>
    </div>

    <script>
        let tick_sound = new Audio("./ticking_sound.mp3");
        let data = {
            start_time: undefined,
            end_time: undefined,
            timer_text: "5:00",
            goal_minutes: 5,
            point_per_minute: 2,
        };

        let counter_timer = document.querySelector("#counter_timer");
        let counter_start_button = document.querySelector("#counter_start_button");
        let counter_end_button = document.querySelector("#counter_end_button");
        let counter_interval = undefined;

        counter_timer.innerText = data.timer_text;

        function import_info(exported_info) {
            data = exported_info.data;
            counter_timer.innerText = data.timer_text;
            if (data.start_time) {
                counter_start_button.disabled = true;
                counter_end_button.disabled = false;
            }
            if (data.end_time) {
                counter_start_button.disabled = true;
                counter_end_button.disabled = true;
            }
            if (data.start_time && !data.end_time) {
                start_counter();
            }
        }

        function export_info() {
            let exported_info = {
                point: get_time_in_minutes() * data.point_per_minute,
                goal_point: data.goal_minutes * data.point_per_minute,
                data: data
            };
            update_status_bar(exported_info);
            return exported_info;
        }

        function get_time_in_minutes() {
            let time = data.end_time - data.start_time;
            return (time || 0) / 1000 / 60;
        }

        function start_counter() {
            info_onchange();

            play_sound();

            counter_start_button.disabled = true;
            counter_end_button.disabled = false;

            data.start_time = Date.now();

            counter_interval = setInterval(() => {
                let time_remaining = counter_timer.innerText;
                let time_array = time_remaining.split(":");
                let minutes = parseInt(time_array[0]);
                let seconds = parseInt(time_array[1]);

                if (seconds == 0) {
                    if (minutes == 0) {
                        end_counter(true);
                    } else {
                        minutes--;
                        seconds = 59;
                    }
                } else {
                    seconds--;
                }

                if (minutes == 3 && seconds == 0) {
                    counter_timer.style.backgroundColor = "var(--LEMON)";
                    play_sound();
                } else if (minutes == 0 && seconds <= 15) {
                    counter_timer.style.backgroundColor = "var(--TOMATO)";
                    play_sound(15);
                }

                counter_timer.innerText = minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
                data.timer_text = counter_timer.innerText;

                info_onchange();
            }, 1000);
        }

        function end_counter(forced) {
            if (forced || confirm("Bạn có chắc chắn muốn kết thúc phiên thiền này?")) {
                clearInterval(counter_interval);
                play_sound();
                data.end_time = Date.now();
                counter_start_button.disabled = true;
                counter_end_button.disabled = true;
                info_onchange();
            }
        }

        function play_sound(duration = 1) {
            tick_sound.play();
            setTimeout(() => {
                tick_sound.pause();
            }, duration * 1000);
            tick_sound.loop = true;
        }

        function update_status_bar(exported_info) {
            if (!document.querySelector("#status_bar")) {
                let status_bar = document.createElement("div");
                status_bar.id = "status_bar";
                document.body.appendChild(status_bar);
            }

            let time_full_string = new Date().toISOString();
            let time_short_string = time_full_string.split("T")[1].split(".")[0];
            let { point, goal_point } = exported_info;

            let status_bar_text = `<span title="${time_full_string}">[${time_short_string}]</span> Điểm hiện tại: ${point} / ${goal_point} (đạt ~${Math.round(point / goal_point * 100)}% so với mục tiêu)`;

            document.querySelector("#status_bar").innerHTML = status_bar_text;
            document.querySelector("#status_bar").style.display = "block";

            if (window.status_bar_timeout) {
                clearTimeout(window.status_bar_timeout);
            }
            window.status_bar_timeout = setTimeout(() => {
                document.querySelector("#status_bar").style.display = "none";
            }, 5000);
        }
    </script>
</body>

</html>
