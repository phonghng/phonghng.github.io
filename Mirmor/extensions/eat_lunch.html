<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../index.css">

    <style>
        label input {
            margin: 10px 5px;
        }
    </style>
</head>

<body>
    <h2>Thực phẩm nên ăn</h2>
    <div class="box" id="should_eat">
        <label>
            <input type="checkbox" id="cac_loai_rau_cu" />
            <span><b>Các loại rau củ</b>: Cà chua, bông cải xanh, cải xoăn, rau bó xôi, hành tây, súp lơ, cà rốt, cải
                mầm Brussels, dưa leo…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_trai_cay" />
            <span><b>Các loại trái cây</b>: Táo, chuối, cam, lê, dâu tây, nho, quả sung, dưa hấu, đào, bơ…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_hat_va_quahach" />
            <span><b>Các loại hạt và quả hạch</b>: Hạnh nhân, quả óc chó, hạt macadamia, quả phỉ, hạt điều, hạt hướng
                dương, hạt bí ngô…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_dau" />
            <span><b>Các loại đậu</b>: Đậu xanh, đậu đỏ, đậu đen, đậu Hà Lan, đậu lăng, đậu phộng, đậu gà…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_cua" />
            <span><b>Các loại củ</b>: Khoai tây, khoai lang, củ cải (trắng hoặc đỏ), khoai mỡ…</span>
        </label><br />
        <label>
            <input type="checkbox" id="ngu_coc_nguyen_hat" />
            <span><b>Ngũ cốc nguyên hạt</b>: Yến mạch nguyên chất, gạo lứt, lúa mạch đen, đại mạch, bắp, kiều mạch, lúa
                mì nguyên hạt, bánh mì, mì ống nguyên hạt…</span>
        </label><br />
        <label>
            <input type="checkbox" id="hai_san" />
            <span><b>Hải sản</b>: Cá hồi, cá mòi, cá hồi hồ, cá ngừ, cá thu, tôm, hàu, sò, cua…</span>
        </label><br />
        <label>
            <input type="checkbox" id="thit_gia_cam" />
            <span><b>Thịt gia cầm</b>: Thịt gà, vịt…</span>
        </label><br />
        <label>
            <input type="checkbox" id="trung" />
            <span><b>Trứng</b>: Trứng gà, trứng cút, trứng vịt…</span>
        </label><br />
        <label>
            <input type="checkbox" id="thuc_pham_tu_sua" />
            <span><b>Thực phẩm từ sữa</b>: Phô mai, sữa chua…</span>
        </label><br />
        <label>
            <input type="checkbox" id="thao_moc_va_gia_vi" />
            <span><b>Thảo mộc và gia vị</b>: Tỏi, húng quế, bạc hà, cây hương thảo, xô thơm, nhục đậu khấu, lá quế,
                tiêu…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_chat_beo_lanh_manh" />
            <span><b>Các chất béo lành mạnh</b>: Dầu ô liu nguyên chất, dầu quả bơ…</span>
        </label><br />
    </div>

    <h2>Thực phẩm không nên ăn</h2>
    <div class="box" id="should_not_eat">
        <label>
            <input type="checkbox" id="cac_loai_thuc_pham_co_duong" />
            <span><b>Các loại thực phẩm có đường</b>: Nước ngọt, kẹo, kem, điểm tâm ngọt…</span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_ngu_coc_tinh_che" />
            <span><b>Các loại ngũ cốc tinh chế</b>: Bánh mì trắng, mì ống được làm từ lúa mì tinh chế. </span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_chat_beo_chuyen_hoa" />
            <span><b>Các chất béo chuyển hóa</b>: Bơ thực vật và nhiều loại thực phẩm chế biến sẵn khác. </span>
        </label><br />
        <label>
            <input type="checkbox" id="cac_loai_dau_da_qua_tinh_che" />
            <span><b>Các loại dầu đã qua tinh chế</b>: Dầu đậu nành, dầu hạt cải, dầu hạt bông…</span>
        </label><br />
        <label>
            <input type="checkbox" id="thit_da_qua_che_bien" />
            <span><b>Thịt đã qua chế biến</b>: Xúc xích làm sẵn như xúc xích xông khói hoặc nướng. </span>
        </label><br />
    </div>

    <script>
        let data = {
            _example_category: {
                _example_food: ["label_text", "is_checked", "checked_time"]
            },
            should_eat: {},
            should_not_eat: {},
            point_per_should_eat: 7.5,
            point_per_should_not_eat: -7.5,
        };

        let checkboxes = document.querySelectorAll("input[type=checkbox]");
        for (let i = 0; i < checkboxes.length; i++) {
            let checkbox = checkboxes[i];
            let label = checkbox.nextElementSibling;
            label.innerHTML = label.innerHTML.replace(/\n/g, "").replace(/\s+/g, " ");
            let label_text = label.innerText;
            let category = checkbox.parentElement.parentElement.id;
            data[category][checkbox.id] = [label_text, checkbox.checked, undefined];
            checkbox.onclick = () => {
                data[category][checkbox.id][1] = checkbox.checked;
                data[category][checkbox.id][2] = Date.now();
                info_onchange();
            }
        }

        function get_total_point() {
            let total_point = 0;
            for (let category in data) {
                if (!category.startsWith("_")) {
                    for (let food in data[category]) {
                        if (data[category][food][1]) {
                            total_point += data["point_per_" + category];
                        }
                    }
                }
            }
            return total_point;
        }

        function import_info(exported_info) {
            data = exported_info.data;
            for (let category in data) {
                if (!category.startsWith("_")) {
                    for (let food in data[category]) {
                        let checkbox = document.getElementById(food);
                        checkbox.checked = data[category][food][1];
                        checkbox.onclick();
                    }
                }
            }
        }

        function export_info() {
            let exported_info = {
                point: get_total_point(),
                goal_point: Object.entries(data.should_eat).length * data.point_per_should_eat,
                data: data
            };
            update_status_bar(exported_info);
            return exported_info;
        }

        function update_status_bar(exported_info) {
            if (!document.querySelector("#status_bar")) {
                let status_bar = document.createElement("div");
                status_bar.id = "status_bar";
                document.body.appendChild(status_bar);
            }

            let time_full_string = new Date().toISOString();
            let time_short_string = time_full_string.split("T")[1].split(".")[0];
            let { point, goal_point } = exported_info;

            let status_bar_text = `<span title="${time_full_string}">[${time_short_string}]</span> Điểm hiện tại: ${point} / ${goal_point} (đạt ~${Math.round(point / goal_point * 100)}% so với mục tiêu)`;

            document.querySelector("#status_bar").innerHTML = status_bar_text;
            document.querySelector("#status_bar").style.display = "block";

            if (window.status_bar_timeout) {
                clearTimeout(window.status_bar_timeout);
            }
            window.status_bar_timeout = setTimeout(() => {
                document.querySelector("#status_bar").style.display = "none";
            }, 5000);
        }
    </script>
</body>

</html>
