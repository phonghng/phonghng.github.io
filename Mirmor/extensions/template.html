<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../javascripts/ui/status_bar.js"></script>
    
    <link rel="stylesheet" href="../stylesheets/general.css">
</head>

<body>
    <script>
        let StatusBar_class = new StatusBar(document.body);

        let data = {};
        // sẽ cần return về formula và cả timestamp

        function import_info(exported_data) {
            data = exported_data.data;
            console.log("imported!", export_info());
        }

        info_onchange();

        function export_info() {
            let exported_info = {
                point: 0,
                goal_point: 100,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
    </script>
</body>

</html>
