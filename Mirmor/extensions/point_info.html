        let ctx = document.querySelector("canvas");
        let chartjs = new Chart(ctx, {
            data: {
                labels: [],

            options: {
                maintainAspectRatio: false,
                scales: {
                    x: {
                        display: false
                    },
                    Mipo: {
                        type: "linear",

                        position: "left",
                    },
                    Amepo: {
                        type: "linear",
                        display: false,
                        position: "left",
                    },
                    Amipo: {
                        type: "linear",
                        display: false,
                        position: "right",
                    }
                }
            }
        });

        function preprocess_reward_points(point_infos) {
            let reward_infos = {
                day: {},
                week: {},
                month: {},
                year_quarter: {}
            }

            const init_infos = (object, id) => {
                let count = (typeof id == "object" ? id[object][2] : 1);
                if (typeof id == "object")
                    id = id[object][0].getTime();
                if (!reward_infos[object][id])
                    reward_infos[object][id] = {
                        sum: 0,
                        count: count,
                        highest_month: 0,
                        highest_week: 0,
                        highest_day: 0
                    };
                return id;
            };

            const update_sum_info = (object, id, value) => {
                id = init_infos(object, id);
                reward_infos[object][id].sum += value;
                return reward_infos[object][id].sum;
            }

            const update_highest_info = (object, id, name, value) => {
                id = init_infos(object, id);
                if (value > reward_infos[object][id][name])
                    reward_infos[object][id][name] = value;
            };

            for (let i = 0; i < point_infos.length; i++) {
                let date_timestamp = new Date(point_infos[i].date).getTime();
                let XDate_data = PPPL_JS.XDate(date_timestamp).start_end_of_current;
                let pre_Mipo = point_infos[i].pre_Mipo;

                let day_sum = update_sum_info("day", date_timestamp, pre_Mipo);
                update_highest_info("week", XDate_data, "highest_day", day_sum);
                update_highest_info("month", XDate_data, "highest_day", day_sum);
                update_highest_info("year_quarter", XDate_data, "highest_day", day_sum);
                let week_sum = update_sum_info("week", XDate_data, pre_Mipo);
                update_highest_info("month", XDate_data, "highest_week", week_sum);
                update_highest_info("year_quarter", XDate_data, "highest_week", week_sum);
                let month_sum = update_sum_info("month", XDate_data, pre_Mipo);
                update_highest_info("year_quarter", XDate_data, "highest_month", month_sum);
                let year_quarter_sum = update_sum_info("year_quarter", XDate_data, pre_Mipo);
            }

            return reward_infos;
        }

        function calculate_reward_points(reward_infos, date_index) {

        }

        function update_data(point_infos, percent_criterions, chart_date_range) {
            percent_criterions =
                Object.entries(percent_criterions).map(percent_criterion => [
                    new Date(percent_criterion[0]).getTime(),
                    percent_criterion[1]
                ]);

            function is_in_chart_date_range(date) {
                return new Date(chart_date_range[0]).getTime() <= new Date(date).getTime()
                    && new Date(date).getTime() <= new Date(chart_date_range[1]).getTime();
            }

            function get_percent_criterion(date) {
                let timestamp = new Date(date).getTime();
                let i;
                for (i = 0; i < percent_criterions.length - 1; i++)
                    if (timestamp < percent_criterions[i + 1][0])
                        break;
                return percent_criterions[i][1];
            }

            const Mipo_name = percent_criterion => `Mipo-${percent_criterion * 100}`;

            for (let i = 0; i < point_infos.length; i++) {
                for (let percent_criterion of percent_criterions)
                    point_infos[i][Mipo_name(percent_criterion[1])] = 0;
                let percent_criterion = get_percent_criterion(point_infos[i].date);
                let point_ratio = point_infos[i].point / point_infos[i].goal_point;
                point_infos[i].pre_Mipo =
                    parseInt((Math.floor(point_ratio * 100) / 100 - percent_criterion) * 100);
            }

            let reward_infos = preprocess_reward_points(point_infos);
            console.log(point_infos, reward_infos);

            for (let i = 0; i < point_infos.length; i++) {
                for (let percent_criterion of percent_criterions)
                    point_infos[i][Mipo_name(percent_criterion[1])] = 0;
                let percent_criterion = get_percent_criterion(point_infos[i].date);
                let point_ratio = point_infos[i].point / point_infos[i].goal_point;
                let Mipo = point_infos[i].pre_Mipo + calculate_reward_points(reward_infos, i);
                point_infos[i][Mipo_name(percent_criterion)] = Mipo;
                point_infos[i]["Amipo"] = (i > 0 ? point_infos[i - 1]["Amipo"] : 0) + Mipo;
                point_infos[i]["Amepo"] = (point_infos[i]["Amipo"] / (i + 1)).toFixed(2);
            }

            /* data.point_infos = point_infos; */
            data.last_updated = Date.now();
            info_onchange();

            point_infos = point_infos.filter(point_info => is_in_chart_date_range(point_info.date));
            let mapped_point_infos = {
                date: point_infos.map(point_info => point_info.date),
                "Amipo": point_infos.map(point_info => point_info["Amipo"]),
                "Amepo": point_infos.map(point_info => point_info["Amepo"])
            };
            for (let [start_date, percent_criterion] of percent_criterions)
                mapped_point_infos[Mipo_name(percent_criterion)] =
                    point_infos.map(point_info => point_info[Mipo_name(percent_criterion)]);

            update_chart(mapped_point_infos);
        }

        function generate_chart_datasets(mapped_point_infos) {
            let datasets = [];
            for (let key in mapped_point_infos)
                if (key != "date")
                    datasets.push({
                        label: key,
                        data: mapped_point_infos[key],
                        type: key.startsWith("Mipo") ? "bar" : "line",
                        yAxisID: key.split("-")[0],
                        stack: key.startsWith("Mipo") ? "Mipo" : null,
                    });
            return datasets;
        }

        function update_chart(mapped_point_infos) {
            chartjs.data = {
                labels: mapped_point_infos.date,
                datasets: generate_chart_datasets(mapped_point_infos)
            };
            chartjs.update();
        }

        function import_data(exported_data) {
            return undefined;
        }

        function export_info() {
            let exported_info = {
                point: 0,
                goal_point: 0,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
