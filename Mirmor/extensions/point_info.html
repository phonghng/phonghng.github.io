<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../scripts/status_bar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../stylesheets/general.css">

    <style>
        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 15px;
        }
    </style>
</head>

<body>
    <canvas style="width: 100%; height: 100%;"></canvas>

    <script>
        let StatusBar_class = new StatusBar(document.body);

        let data = {
            phnotion_point_info_return: [],
            last_updated: undefined
        };

        let ctx = document.querySelector("canvas");
        let chartjs = new Chart(ctx, {
            data: {
                labels: [],
                datasets: [{
                    label: "Điểm (đMirmor)",
                    data: [],
                    type: "bar"
                }, {
                    label: "Luỹ kế điểm (lkđMirmor)",
                    data: [],
                    type: "line"
                }]
            },
            options: {
                maintainAspectRatio: false
            }
        });

        function update_data(phnotion_point_info_return) {
            data.last_updated = Date.now();
            info_onchange();

            let point_info = phnotion_point_info_return;
            point_info.reverse();
            let mapped_point_info = {
                date: point_info.map(date_point_info => date_point_info.date),
                point: point_info.map(date_point_info => date_point_info.point),
                accumulated_point: point_info.map(date_point_info => date_point_info.accumulated_point)
            };

            update_chart(mapped_point_info);
        }

        function update_chart(mapped_point_info) {
            chartjs.data = {
                labels: mapped_point_info.date,
                datasets: [{
                    label: "Điểm (Mipo)",
                    data: mapped_point_info.point,
                    type: "bar"
                }, {
                    label: "Luỹ kế điểm (Amipo)",
                    data: mapped_point_info.accumulated_point,
                    type: "line"
                }]
            };
            chartjs.update();
        }

        function import_info(exported_data) {
            return undefined;
        }

        function export_info() {
            let exported_info = {
                point: 0,
                goal_point: 0,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
    </script>
</body>

</html>
