<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../scripts/status_bar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../stylesheets/general.css">

    <style>
        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 15px;
        }
    </style>
</head>

<body>
    <canvas style="width: 100%; height: 100%;"></canvas>

    <script>
        let StatusBar_class = new StatusBar(document.body);

        let data = {
            /* point_infos: [], */
            last_updated: undefined
        };

        function average(ctx) {
            const values = ctx.chart.data.datasets[0].data;
            return values.reduce((a, b) => a + b, 0) / values.length;
        }

        let ctx = document.querySelector("canvas");
        let chartjs = new Chart(ctx, {
            data: {
                labels: [],
                datasets: []
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    Mipo: {
                        type: "linear",
                        display: true,
                        position: "left",
                    },
                    Amepo: {
                        type: "linear",
                        display: true,
                        position: "left",
                    },
                    Amipo: {
                        type: "linear",
                        display: true,
                        position: "right",
                    }
                }
            }
        });

        function update_data(point_infos, percent_criterions, chart_date_range) {
            const Mipo_name = percent_criterion => `Mipo-${percent_criterion * 100}`;
            const Amipo_name = percent_criterion => `Amipo-${percent_criterion * 100}`;
            const Amepo_name = percent_criterion => `Amepo-${percent_criterion * 100}`;
            const is_in_chart_date_range = date =>
                new Date(chart_date_range[0]).getTime() <= new Date(date).getTime()
                && new Date(date).getTime() <= new Date(chart_date_range[1]).getTime();

            let Amipo = Object.fromEntries(
                percent_criterions.map(
                    percent_criterion => [percent_criterion, 0]
                )
            );
            for (let i = 0; i < point_infos.length; i++) {
                let point_ratio = point_infos[i].point / point_infos[i].goal_point;
                for (let percent_criterion of percent_criterions) {
                    point_infos[i][Mipo_name(percent_criterion)] =
                        parseInt((Math.floor(point_ratio * 100) / 100 - percent_criterion) * 100)
                    Amipo[percent_criterion] += point_infos[i][Mipo_name(percent_criterion)];
                    point_infos[i][Amipo_name(percent_criterion)] = Amipo[percent_criterion];
                    point_infos[i][Amepo_name(percent_criterion)] =
                        (Amipo[percent_criterion] / (i + 1)).toFixed(2);
                }
            }

            /* data.point_infos = point_infos; */
            data.last_updated = Date.now();
            info_onchange();

            point_infos = point_infos.filter(point_info => is_in_chart_date_range(point_info.date));
            let mapped_point_infos = {
                date: point_infos.map(point_info => point_info.date)
            };
            for (let percent_criterion of percent_criterions) {
                mapped_point_infos[Mipo_name(percent_criterion)] =
                    point_infos.map(point_info => point_info[Mipo_name(percent_criterion)]);
                mapped_point_infos[Amipo_name(percent_criterion)] =
                    point_infos.map(point_info => point_info[Amipo_name(percent_criterion)]);
                mapped_point_infos[Amepo_name(percent_criterion)] =
                    point_infos.map(point_info => point_info[Amepo_name(percent_criterion)]);
            }

            update_chart(mapped_point_infos);
        }

        function generate_chart_datasets(mapped_point_infos) {
            let datasets = [];
            for (let key in mapped_point_infos)
                if (key != "date")
                    datasets.push({
                        label: key,
                        data: mapped_point_infos[key],
                        type: key.startsWith("Mipo") ? "bar" : "line",
                        yAxisID: key.split("-")[0]
                    });
            return datasets;
        }

        function update_chart(mapped_point_infos) {
            chartjs.data = {
                labels: mapped_point_infos.date,
                datasets: generate_chart_datasets(mapped_point_infos)
            };
            chartjs.update();
        }

        function import_data(exported_data) {
            return undefined;
        }

        function export_info() {
            let exported_info = {
                point: 0,
                goal_point: 0,
                data: data
            };
            StatusBar_class.show_status_extension(exported_info);
            return exported_info;
        }
    </script>
</body>

</html>
