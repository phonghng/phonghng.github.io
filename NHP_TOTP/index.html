<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHP_TOTP</title>

    <script src="./sha.js"></script>
    <script src="./nhp_totp.js"></script>
    <script src="./crypto-js.min.js"></script>

    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div style="text-align: center;">
        <h1>
            NHP_TOTP
        </h1>
    </div>

    <h2>Giải mã</h2>
    <div class="box" id="decrypt">
        <input type="password" id="decrypt_password" placeholder="Nhập mật khẩu để giải mã..." />
        <button onclick="javascript:decrypt();" id="decrypt_button">Giải mã</button>
        <div id="otp_list"></div>
    </div>

    <h2>Mã hoá</h2>
    <div class="box" id="encrypt">
        <input type="file" id="encrypt_file" />
        <input type="password" id="encrypt_password" placeholder="Nhập mật khẩu để giải mã..." />
        <button onclick="javascript:encrypt();" id="encrypt_button">Mã hoá</button>
        <textarea id="encrypt_result" placeholder="Chuỗi đã mã hoá..."></textarea>
    </div>

    <script src="./index.js"></script>
</body>

</html>
