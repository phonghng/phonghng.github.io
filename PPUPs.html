<!DOCTYPE html>
<html>

<head>
    <title>PPUPs</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="./images/PPUPs.png" type="image/x-icon">

    <style>
        :root {
            --BLUE: #1877F2;
            --CHERRY: #F3425F;
            --GRAPE: #9360F7;
            --LEMON: #F7B928;
            --LIME: #45BD62;
            --PINK: #FF66BF;
            --SEAFOAM: #54C7EC;
            --TEAL: #2ABBA7;
            --TOMATO: #FB724B;
        }

        html {
            height: fit-content;
            min-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body {
            background-color: #18191A;
            font-family: Arial, Helvetica, sans-serif;
        }

        #item_list {
            display: flex;
            gap: 20px 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 900px;
            height: 100%;
            margin: 20px;
        }

        .item {
            width: 75px;
            background-color: #212121;
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s;
            user-select: none;
            display: flex;
            align-items: flex-end;
            aspect-ratio: 1 / 1;
        }

        .item:hover {
            background-color: #3A3B3C;
        }

        .item:active {
            background-color: #212121;
        }

        .item img:nth-child(1) {
            border-radius: 100%;
            background-color: var(--base_color);
            border: 2px solid #FFFFFF;
            width: calc(100% - 4px);
        }

        .item img:nth-child(2) {
            border-radius: 100%;
            background-color: var(--base_color);
            border: 2px solid #FFFFFF;
            width: calc(35% - 4px);
            box-shadow: 3px 3px 15px 3px #18191A;
            margin-left: calc(-35%);
        }
    </style>
</head>
