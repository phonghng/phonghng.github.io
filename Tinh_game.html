<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò chơi Tinh</title>

    <script src="./Tinh_game.js"></script>

    <style>
        body {
            margin: 0;
            background-color: #18191A;
        }

        .person {
            background-color: #242526;
            padding: 15px;
            border-radius: 15px;
            margin: 15px;
            line-height: 20px;
            white-space: nowrap;
            position: absolute;
            top: calc(var(--rank) * 65px);
            transition: all 0.25s;
            overflow: hidden;
        }

        .person:hover {
            overflow: auto;
            background-color: #303031;
            min-width: fit-content;
            max-width: calc(100% - 60px);
        }

        .person .name {
            font-weight: bold;
            color: #1877F2;
        }

        .person .Tinh {
            color: #F3425F;
            margin-left: 5px;
        }
    </style>
</head>

<body>
    <div id="persons"></div>
    <script>
        let _Game = new Game(
            [
                "Hội Next-New-National",
                "Hội đồng Đánh giá Tinh Quốc tế",
                "Tân Hội NNN",
                "Đảng Chủ nghĩa Tinh Đông Dương",
                "Liên minh TQD Châu Á - Thái Bình Dương",
                "Liên minh Quốc tế Châu Phi",
                "Đại hội đồng Quốc tế",
                "Đại hội đồng Đại hội nghị Liên hiệp NNN Việt Nam và Quốc tế Cộng sản",
                "Đại Liên N.A.T.O."
            ]
        );

        let _UI = new UI(document.querySelector("#persons"), _Game);
        _UI.update();

        setInterval(() => {
            _Game.random_event();
            _UI.update();
        }, 250);
    </script>
</body>

</html>
